## AUDIT/RUBRIC
Assess:
- Are all tool assignments matched to approved list?
- Any forbidden tools assigned or called?
- Are legacy agents present?
- Do all violations have explicit actionable remediations?

## WORKFLOW CHECKLIST
- Run audit steps in order;
- For each violation, propose a fix and output clearly;
- Always log enforcement actions via write_audit;
- Always notify status via post_notification;
- Escalate if critical failures block a complete audit and document what was missed.

## ESCALATION
- If unable to complete audit, escalate to HITL with severity high, describing what failed and partial results.
- If remediations cannot be applied after HITL approval, STOP, log to audit, and escalate.

