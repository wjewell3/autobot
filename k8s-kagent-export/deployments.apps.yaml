03cagent\u003e: called \u003ctool\u003e which is not in its approved list\nRecommendation: \u003cspecific remediation\u003e\n```\n\nRULES:\n- You NEVER modify agents. You report violations for humans to fix.\n- You use k8s_get_resources and k8s_describe_resource in READ-ONLY mode.\n- You NEVER use k8s_apply_manifest, k8s_delete_resource, k8s_create_resource, or k8s_patch_resource.\n- If nothing is wrong, say so: \"CLEAN. All agents within approved capability surface.\"\n","tools":[{"mcpServer":{"apiGroup":"kagent.dev","kind":"RemoteMCPServer","name":"kagent-tool-server","toolNames":["k8s_get_resources","k8s_describe_resource","k8s_get_resource_yaml"]},"type":"McpServer"},{"mcpServer":{"apiGroup":"kagent.dev","kind":"RemoteMCPServer","name":"audit-logger","toolNames":["get_recent_audit"]},"type":"McpServer"}]},"description":"Security officer. Governs capability surface and agent permissions.","type":"Declarative"}}
