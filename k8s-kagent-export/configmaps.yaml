- apiVersion: v1
  data:
    server.py: "\"\"\"\nhardening-agent.py — Watches agent decision patterns and proposes\ndeterministic
      rules to replace repetitive LLM decisions.\n\nThis is the compounding mechanism.
      Over time, the LLM surface shrinks\nand the deterministic surface grows.\n\nHow
      it works:\n  Level 1 (v1): Count (agent, action) frequencies → propose deterministic
      rules\n  Level 2 (v2): Analyze failure/rejection patterns → propose system message
      fixes\n  Level 3 (future): Cluster similar failures → build knowledge docs →
      RAG-augment\n\nv2 adds failure analysis on top of frequency counting:\n  - Tracks
      severity=error/warning entries by (agent, root_cause)\n  - Tracks output_rejected
      actions (PM pushing back on workers)\n  - When the same failure pattern appears
      FAILURE_THRESHOLD+ times,\n    proposes a system message patch to prevent recurrence\n
      \ - Posts failure-derived proposals to #hardening-proposals with context\n\"\"\"\n\nimport
      asyncio\nimport json\nimport logging\nimport os\nimport re\nimport sys\nimport
      time\nfrom collections import Counter, defaultdict\nfrom datetime import datetime,
      timezone\n\nimport httpx\nimport yaml\nfrom mcp.client.streamable_http import
      streamablehttp_client\nfrom mcp import ClientSession\nfrom mcp.server.fastmcp
      import FastMCP\nfrom mcp.server.transport_security import TransportSecuritySettings\n\nlogging.basicConfig(\n
      \   level=logging.INFO,\n    format=\"%(asctime)s %(levelname)s %(message)s\",\n
      \   stream=sys.stdout,\n)\nlog = logging.getLogger(\"hardening-agent\")\n\nAUDIT_URL
      = os.getenv(\n    \"AUDIT_LOGGER_URL\", \"http://audit-logger.kagent.svc.cluster.local:8092\"\n)\nGITHUB_MCP_URL
      = os.getenv(\n    \"GITHUB_MCP_URL\", \"http://github-mcp.kagent.svc.cluster.local:8087\"\n)\nGITHUB_REPO
      = os.getenv(\"GITHUB_REPO\", \"wjewell3/autobot\")\nSLACK_BOT_TOKEN = os.getenv(\"SLACK_BOT_TOKEN\",
      \"\")\nSLACK_PROPOSALS_CHANNEL = os.getenv(\"SLACK_PROPOSALS_CHANNEL_ID\", \"\")\nRULES_PATH
      = \"/etc/hardening/rules.yaml\"\nANALYSIS_INTERVAL = int(os.getenv(\"ANALYSIS_INTERVAL_SECONDS\",
      \"300\"))  # 5 min\nPROPOSAL_THRESHOLD = int(os.getenv(\"PROPOSAL_THRESHOLD\",
      \"10\"))\nFAILURE_THRESHOLD = int(os.getenv(\"FAILURE_THRESHOLD\", \"3\"))\n\nmcp
      = FastMCP(\n    \"hardening-agent\",\n    transport_security=TransportSecuritySettings(enable_dns_rebinding_protection=False),\n)\n\n#
      Track which patterns we've already proposed (avoid spam)\nproposed_patterns:
      set[str] = set()\nproposed_failures: set[str] = set()\n\n\nasync def call_mcp_tool(server_url:
      str, tool_name: str, arguments: dict) -> dict:\n    \"\"\"Call a tool on an
      MCP server using the proper MCP client SDK.\"\"\"\n    try:\n        async with
      streamablehttp_client(f\"{server_url}/mcp\") as (read, write, _):\n            async
      with ClientSession(read, write) as session:\n                await session.initialize()\n
      \               result = await session.call_tool(tool_name, arguments)\n                if
      result.content:\n                    text = result.content[0].text\n                    try:\n
      \                       return json.loads(text)\n                    except
      json.JSONDecodeError:\n                        return {\"text\": text}\n        return
      {\"error\": \"No content returned\"}\n    except Exception as e:\n        log.error(f\"MCP
      call failed ({server_url} / {tool_name}): {e}\")\n        return {\"error\":
      str(e)}\n\n\nasync def create_pr_via_github_mcp(proposal_yaml: str, pattern_key:
      str) -> dict:\n    \"\"\"Create a branch, push a proposal file, and open a PR
      via github-mcp.\"\"\"\n    ts = int(time.time())\n    branch_name = f\"hardening/proposal-{ts}\"\n\n
      \   # 1. Create branch\n    branch_result = await call_mcp_tool(GITHUB_MCP_URL,
      \"github_create_branch\", {\n        \"repo\": GITHUB_REPO,\n        \"branch\":
      branch_name,\n        \"from_branch\": \"main\",\n    })\n    if \"error\" in
      branch_result:\n        log.error(f\"Failed to create branch: {branch_result['error']}\")\n
      \       return branch_result\n\n    # 2. Push proposal file to the new branch\n
      \   file_path = f\"infra/hardening-proposals/{pattern_key.replace(':', '-')}-{ts}.yaml\"\n
      \   push_result = await call_mcp_tool(GITHUB_MCP_URL, \"github_push_file\",
      {\n        \"repo\": GITHUB_REPO,\n        \"path\": file_path,\n        \"content\":
      proposal_yaml,\n        \"message\": f\"hardening: propose rule for {pattern_key}\",\n
      \       \"branch\": branch_name,\n    })\n    if \"error\" in push_result:\n
      \       log.error(f\"Failed to push file: {push_result['error']}\")\n        return
      push_result\n\n    # 3. Open PR\n    pr_result = await call_mcp_tool(GITHUB_MCP_URL,
      \"github_create_pr\", {\n        \"repo\": GITHUB_REPO,\n        \"title\":
      f\"Hardening: propose rule for {pattern_key}\",\n        \"body\": (\n            f\"##
      Hardening Proposal\\n\\n\"\n            f\"**Pattern:** `{pattern_key}`\\n\\n\"\n
      \           f\"This pattern was detected frequently in the audit log. \"\n            f\"Review
      and merge to add as a deterministic rule.\\n\\n\"\n            f\"**Rollback:**
      revert this PR or `kubectl rollout undo` affected deployments.\\n\\n\"\n            f\"```yaml\\n{proposal_yaml}\\n```\"\n
      \       ),\n        \"head\": branch_name,\n        \"base\": \"main\",\n    })\n
      \   if \"error\" in pr_result:\n        log.error(f\"Failed to create PR: {pr_result['error']}\")\n
      \   else:\n        log.info(f\"PR created: {pr_result.get('url', 'unknown')}\")\n\n
      \   return pr_result\n\n\ndef load_rules() -> dict:\n    try:\n        with
      open(RULES_PATH) as f:\n            return yaml.safe_load(f) or {}\n    except
      FileNotFoundError:\n        return {}\n\n\nasync def get_audit_entries(count:
      int = 500) -> list[dict]:\n    \"\"\"Fetch recent audit entries.\"\"\"\n    try:\n
      \       result = await call_mcp_tool(AUDIT_URL, \"get_recent_audit\", {\"count\":
      count})\n        text = result.get(\"text\", \"\")\n        if not text:\n            return
      []\n        entries = []\n        for line in text.strip().split(\"\\n\"):\n
      \           if line.strip():\n                try:\n                    entries.append(json.loads(line))\n
      \               except json.JSONDecodeError:\n                    pass\n        return
      entries\n    except Exception as e:\n        log.debug(f\"Audit fetch failed:
      {e}\")\n    return []\n\n\nasync def post_proposal(pattern_key: str, count:
      int, examples: list[str],\n                         proposed_rule: str):\n    \"\"\"Post
      a hardening proposal to Slack and create a GitHub PR.\"\"\"\n    # Create PR
      via github-mcp\n    pr_result = await create_pr_via_github_mcp(proposed_rule,
      pattern_key)\n    pr_url = pr_result.get(\"url\", \"\")\n    pr_number = pr_result.get(\"number\",
      \"?\")\n\n    if not SLACK_BOT_TOKEN or not SLACK_PROPOSALS_CHANNEL:\n        log.info(f\"PROPOSAL
      (no Slack): {pattern_key} ({count} occurrences) PR: {pr_url}\")\n        log.info(f\"
      \ Rule: {proposed_rule}\")\n        return\n\n    examples_text = \"\\n\".join(f\"
      \ • {e}\" for e in examples[:5])\n    pr_text = f\"\\n\\n*PR:* <{pr_url}|#{pr_number}>
      — merge to approve, close to reject.\" if pr_url else \"\"\n    try:\n        async
      with httpx.AsyncClient() as client:\n            await client.post(\n                \"https://slack.com/api/chat.postMessage\",\n
      \               headers={\n                    \"Authorization\": f\"Bearer
      {SLACK_BOT_TOKEN}\",\n                    \"Content-Type\": \"application/json\",\n
      \               },\n                json={\n                    \"channel\":
      SLACK_PROPOSALS_CHANNEL,\n                    \"blocks\": [\n                        {\n
      \                           \"type\": \"section\",\n                            \"text\":
      {\n                                \"type\": \"mrkdwn\",\n                                \"text\":
      (\n                                    f\"\U0001F527 *Hardening Proposal*\\n\"\n
      \                                   f\"*Pattern:* `{pattern_key}`\\n\"\n                                    f\"*Occurrences:*
      {count}\\n\\n\"\n                                    f\"*Recent examples:*\\n{examples_text}\\n\\n\"\n
      \                                   f\"*Proposed rule:*\\n```{proposed_rule}```\"\n
      \                                   f\"{pr_text}\"\n                                ),\n
      \                           },\n                        },\n                        {\n
      \                           \"type\": \"context\",\n                            \"elements\":
      [\n                                {\n                                    \"type\":
      \"mrkdwn\",\n                                    \"text\": (\n                                        \"Merge
      the PR to approve this rule. \"\n                                        \"Close
      it to reject.\"\n                                    ),\n                                }\n
      \                           ],\n                        },\n                    ],\n
      \               },\n                timeout=10,\n            )\n    except Exception
      as e:\n        log.error(f\"Failed to post proposal: {e}\")\n\n\ndef analyze_patterns(entries:
      list[dict]) -> list[dict]:\n    \"\"\"\n    Level 1: Find repetitive patterns
      in audit entries.\n    Returns list of candidate proposals for deterministic
      rules.\n    \"\"\"\n    # Group by (agent_name, action) pairs\n    pattern_counter:
      Counter = Counter()\n    pattern_examples: dict[str, list[str]] = defaultdict(list)\n\n
      \   for entry in entries:\n        if entry.get(\"event_type\") != \"AGENT_ACTION\":\n
      \           continue\n\n        agent = entry.get(\"agent_name\", \"unknown\")\n
      \       action = entry.get(\"action\", \"unknown\")\n        details = entry.get(\"details\",
      \"\")\n        key = f\"{agent}:{action}\"\n\n        pattern_counter[key] +=
      1\n        if len(pattern_examples[key]) < 5:\n            pattern_examples[key].append(details[:200])\n\n
      \   # Find patterns above threshold that we haven't proposed yet\n    proposals
      = []\n    for key, count in pattern_counter.most_common():\n        if count
      >= PROPOSAL_THRESHOLD and key not in proposed_patterns:\n            agent,
      action = key.split(\":\", 1)\n            proposals.append({\n                \"pattern_key\":
      key,\n                \"agent\": agent,\n                \"action\": action,\n
      \               \"count\": count,\n                \"examples\": pattern_examples[key],\n
      \               \"proposed_rule\": (\n                    f\"# Auto-generated
      rule for {key}\\n\"\n                    f\"- pattern: \\\"{key}\\\"\\n\"\n
      \                   f\"  agent: {agent}\\n\"\n                    f\"  action:
      {action}\\n\"\n                    f\"  occurrences: {count}\\n\"\n                    f\"
      \ rule: \\\"deterministic\\\"  # Replace LLM decision\\n\"\n                    f\"
      \ status: proposed  # Change to 'active' after approval\"\n                ),\n
      \           })\n\n    return proposals\n\n\n# ── Level 2: Failure Pattern Analysis
      ───────────────────\n\n# Keywords that signal different failure root causes\nFAILURE_CATEGORIES
      = {\n    \"empty_results\": [\n        \"0 results\", \"no results\", \"found
      nothing\", \"no businesses\",\n        \"nothing found\", \"returned 0\", \"empty\",
      \"none found\",\n    ],\n    \"wrong_results\": [\n        \"churches\", \"cemeteries\",
      \"schools\", \"unrelated\",\n        \"doesn't match\", \"wrong type\", \"irrelevant\",\n
      \   ],\n    \"tool_failure\": [\n        \"timeout\", \"connection refused\",
      \"500\", \"502\", \"503\",\n        \"rate limit\", \"quota\", \"api error\",
      \"failed to call\",\n    ],\n    \"quality_issue\": [\n        \"missing fields\",
      \"incomplete\", \"no url\", \"no email\",\n        \"no address\", \"no name\",
      \"malformed\", \"invalid\",\n    ],\n}\n\n\ndef categorize_failure(details:
      str) -> str:\n    \"\"\"Extract a root-cause category from failure details text.\"\"\"\n
      \   details_lower = details.lower()\n    for category, keywords in FAILURE_CATEGORIES.items():\n
      \       for kw in keywords:\n            if kw in details_lower:\n                return
      category\n    return \"uncategorized\"\n\n\ndef analyze_failures(entries: list[dict])
      -> list[dict]:\n    \"\"\"\n    Level 2: Find failure patterns — errors, warnings,
      and rejections.\n    Groups by (agent, failure_category) and proposes system
      message fixes.\n    \"\"\"\n    failure_counter: Counter = Counter()\n    failure_details:
      dict[str, list[dict]] = defaultdict(list)\n\n    for entry in entries:\n        if
      entry.get(\"event_type\") != \"AGENT_ACTION\":\n            continue\n\n        severity
      = entry.get(\"severity\", \"info\")\n        action = entry.get(\"action\",
      \"\")\n        agent = entry.get(\"agent_name\", \"unknown\")\n        details
      = entry.get(\"details\", \"\")\n\n        # Capture errors/warnings and explicit
      rejections\n        is_failure = severity in (\"error\", \"warning\", \"critical\")\n
      \       is_rejection = action in (\n            \"output_rejected\", \"result_rejected\",
      \"task_blocked\",\n            \"validation_failed\", \"retry_requested\",\n
      \       )\n\n        if not (is_failure or is_rejection):\n            continue\n\n
