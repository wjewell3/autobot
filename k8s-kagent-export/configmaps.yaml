      from fastapi import FastAPI
      import json, uvicorn, os, smtplib, httpx
      from email.mime.text import MIMEText
      from email.mime.multipart import MIMEMultipart

      app = FastAPI()
      GMAIL = os.environ.get("GMAIL_EMAIL", "")
      GMAIL_PASS = os.environ.get("GMAIL_APP_PASSWORD", "")
      APPROVAL_URL = "http://approval-server.kagent.svc.cluster.local:8089"

      TOOLS = [
        {"name": "gmail_send_email", "description": "Send email via Gmail.", "inputSchema": {"type": "object", "properties": {"to": {"type": "string"}, "subject": {"type": "string"}, "body": {"type": "string"}, "html": {"type": "boolean", "default": False}}, "required": ["to", "subject", "body"]}},
        {"name": "gmail_request_approval", "description": "Send HTML approval email with APPROVE/REJECT buttons. After calling, Phase A is DONE - do not wait or poll.", "inputSchema": {"type": "object", "properties": {"to": {"type": "string"}, "subject": {"type": "string"}, "details": {"type": "string"}, "business": {"type": "string"}, "repo": {"type": "string"}}, "required": ["to", "subject", "details", "business", "repo"]}},
        {"name": "gmail_check_approval", "description": "Check approval status. Returns PENDING, APPROVED, or REJECTED. Only call if explicitly asked.", "inputSchema": {"type": "object", "properties": {"token": {"type": "string"}}, "required": ["token"]}}
      ]

      def send_raw(to, subject, body, html=False):
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = GMAIL
          msg["To"] = to
          msg.attach(MIMEText(body, "html" if html else "plain"))
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(GMAIL, GMAIL_PASS)
              s.sendmail(GMAIL, to, msg.as_string())

      @app.post("/mcp")
      async def mcp(request: dict):
          method = request.get("method")
          id_ = request.get("id")
          if method == "initialize":
              return {"jsonrpc": "2.0", "id": id_, "result": {"protocolVersion": "2024-11-05", "capabilities": {"tools": {}}, "serverInfo": {"name": "gmail_mcp", "version": "1.0.0"}}}
          if method == "tools/list":
              return {"jsonrpc": "2.0", "id": id_, "result": {"tools": TOOLS}}
          if method == "tools/call":
              name = request["params"]["name"]
              args = request["params"].get("arguments", {})
              try:
                  if name == "gmail_send_email":
                      send_raw(args["to"], args["subject"], args["body"], args.get("html", False))
                      text = json.dumps({"sent": True, "to": args["to"]})
                      print(f"[gmail_send_email] to={args['to']}")
                  elif name == "gmail_request_approval":
                      async with httpx.AsyncClient(timeout=10) as client:
                          r = await client.post(f"{APPROVAL_URL}/approval/create", json={"subject": args["subject"], "details": args["details"], "business": args.get("business",""), "repo": args.get("repo","")})
                          data = r.json()
                      send_raw(args["to"], f"[ACTION REQUIRED] {args['subject']}", data["email_html"], html=True)
                      text = json.dumps({"token": data["token"], "sent": True, "message": "Approval email sent. Phase A complete."})
                      print(f"[gmail_request_approval] to={args['to']} token={data['token']}")
                  elif name == "gmail_check_approval":
                      async with httpx.AsyncClient(timeout=10) as client:
                          r = await client.get(f"{APPROVAL_URL}/approval/status?token={args['token']}")
                          data = r.json()
                      text = json.dumps(data)
                      print(f"[gmail_check_approval] status={data.get('status')}")
                  else:
                      text = "Unknown tool"
              except Exception as e:
                  text = json.dumps({"error": str(e)})
                  print(f"[{name}] ERROR: {e}")
              return {"jsonrpc": "2.0", "id": id_, "result": {"content": [{"type": "text", "text": text}]}}
          return {"jsonrpc": "2.0", "id": id_, "error": {"code": -32601, "message": "Method not found"}}

      if __name__ == "__main__":
          uvicorn.run(app, host="0.0.0.0", port=8088)
