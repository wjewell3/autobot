        dict[str, int] = defaultdict(int)\\nwarnings_sent: set[str] = set()\\n\\n\\ndef
        load_budgets() -\\u003e dict:\\n    with open(BUDGET_PATH) as f:\\n        return
        yaml.safe_load(f)\\n\\n\\nasync def slack_alert(text: str):\\n    \\\"\\\"\\\"Post
        a budget alert to Slack.\\\"\\\"\\\"\\n    if not SLACK_BOT_TOKEN or not SLACK_ALERT_CHANNEL:\\n
        \       log.info(f\\\"ALERT (no Slack): {text}\\\")\\n        return\\n    try:\\n
        \       async with httpx.AsyncClient() as client:\\n            await client.post(\\n
        \               \\\"https://slack.com/api/chat.postMessage\\\",\\n                headers={\\n
        \                   \\\"Authorization\\\": f\\\"Bearer {SLACK_BOT_TOKEN}\\\",\\n
        \                   \\\"Content-Type\\\": \\\"application/json\\\",\\n                },\\n
        \               json={\\n                    \\\"channel\\\": SLACK_ALERT_CHANNEL,\\n
        \                   \\\"text\\\": f\\\"\U0001F4B0 *Resource Governor Alert*\\\\n{text}\\\",\\n
        \               },\\n                timeout=10,\\n            )\\n    except
        Exception as e:\\n        log.error(f\\\"Failed to post Slack alert: {e}\\\")\\n\\n\\nasync
        def check_litellm_usage() -\\u003e dict:\\n    \\\"\\\"\\\"Query LiteLLM for
