- apiVersion: v1
  data:
    server.py: "\"\"\"\nslack_poster.py — MCP tools for posting HITL approval requests
      to Slack.\n\nAdd this to your existing search-tool-server or gmail-tool-server,\nOR
      deploy as its own hitl-tool-server using the standard FastMCP template.\n\nEnv
      vars (add to the target deployment's K8s secret):\n  SLACK_BOT_TOKEN         —
      xoxb-...\n  SLACK_HITL_CHANNEL_ID   — C0XXXXXXX (channel ID, not name)\n  SLACK_ESCALATION_CHANNEL_ID
      — defaults to SLACK_HITL_CHANNEL_ID\n  HITL_WEBHOOK_URL        — https://autobot-chi-tawny.vercel.app/api/hitl\n
      \                           (used in escalation re-posts so agents know where
      acks go)\n\"\"\"\n\nimport asyncio\nimport json\nimport logging\nimport os\nimport
      uuid\nfrom datetime import datetime, timezone\n\nimport httpx\nfrom mcp.server.fastmcp
      import FastMCP\nfrom mcp.server.transport_security import TransportSecuritySettings\n\nlog
      = logging.getLogger(\"slack-poster\")\n\nSLACK_BOT_TOKEN = os.environ[\"SLACK_BOT_TOKEN\"]\nSLACK_HITL_CHANNEL_ID
      = os.environ[\"SLACK_HITL_CHANNEL_ID\"]\nSLACK_ESCALATION_CHANNEL_ID = os.getenv(\n
      \   \"SLACK_ESCALATION_CHANNEL_ID\", SLACK_HITL_CHANNEL_ID\n)\n\n# Timeout seconds
      per severity level\n# low   → auto-approve after timeout (non-blocking work)\n#
      medium → escalate to escalation channel\n# high   → auto-reject (potentially
      destructive action)\nTIMEOUTS = {\"low\": 30 * 60, \"medium\": 15 * 60, \"high\":
      5 * 60}\nTIMEOUT_ACTIONS = {\"low\": \"approved\", \"medium\": \"escalated\",
      \"high\": \"rejected\"}\n\nmcp = FastMCP(\n    \"hitl-tool-server\",\n    transport_security=TransportSecuritySettings(enable_dns_rebinding_protection=False),\n)\n\n#
      ---------------------------------------------------------------------------\n#
      Slack API helpers\n# ---------------------------------------------------------------------------\n\nasync
      def slack_post(endpoint: str, body: dict) -> dict:\n    async with httpx.AsyncClient()
      as client:\n        resp = await client.post(\n            f\"https://slack.com/api/{endpoint}\",\n
      \           headers={\n                \"Authorization\": f\"Bearer {SLACK_BOT_TOKEN}\",\n
      \               \"Content-Type\": \"application/json\",\n            },\n            json=body,\n
      \           timeout=10,\n        )\n        resp.raise_for_status()\n        data
      = resp.json()\n        if not data.get(\"ok\"):\n            raise RuntimeError(f\"Slack
      API error: {data.get('error')}\")\n        return data\n\n\nasync def post_approval_message(\n
      \   channel_id: str,\n    request_id: str,\n    requesting_agent: str,\n    task_context:
      str,\n    proposed_action: str,\n    severity: str,\n    timeout_seconds: int,\n)
      -> str:\n    \"\"\"Post the HITL approval message with buttons. Returns message
      timestamp.\"\"\"\n\n    severity_emoji = {\"low\": \"\U0001F7E2\", \"medium\":
      \"\U0001F7E1\", \"high\": \"\U0001F534\"}.get(severity, \"⚪\")\n\n    # Value
      embedded in each button so the webhook knows what to resume\n    button_value
      = json.dumps({\n        \"request_id\": request_id,\n        \"context\": {\n
      \           \"requesting_agent\": requesting_agent,\n            \"task_context\":
      task_context,\n            \"proposed_action\": proposed_action,\n        },\n
      \   })\n\n    blocks = [\n        {\n            \"type\": \"section\",\n            \"text\":
      {\n                \"type\": \"mrkdwn\",\n                \"text\": (\n                    f\"\U0001F514
      *HITL Approval Required*\\n\"\n                    f\"*Agent:* `{requesting_agent}`\\n\"\n
      \                   f\"*Severity:* {severity_emoji} {severity.upper()}\\n\\n\"\n
      \                   f\"*Task:* {task_context}\\n\"\n                    f\"*Proposed
      Action:* {proposed_action}\"\n                ),\n            },\n        },\n
      \       {\n            \"type\": \"context\",\n            \"elements\": [\n
      \               {\n                    \"type\": \"mrkdwn\",\n                    \"text\":
      f\"Request ID: `{request_id}` | Timeout: {timeout_seconds // 60}min\",\n                }\n
      \           ],\n        },\n        {\n            \"type\": \"actions\",\n
      \           \"elements\": [\n                {\n                    \"type\":
      \"button\",\n                    \"text\": {\"type\": \"plain_text\", \"text\":
      \"✅ Approve\"},\n                    \"style\": \"primary\",\n                    \"action_id\":
      \"approved\",\n                    \"value\": button_value,\n                },\n
      \               {\n                    \"type\": \"button\",\n                    \"text\":
      {\"type\": \"plain_text\", \"text\": \"❌ Reject\"},\n                    \"style\":
      \"danger\",\n                    \"action_id\": \"rejected\",\n                    \"value\":
      button_value,\n                },\n                {\n                    \"type\":
      \"button\",\n                    \"text\": {\"type\": \"plain_text\", \"text\":
      \"⬆️ Escalate\"},\n                    \"action_id\": \"escalated\",\n                    \"value\":
      button_value,\n                },\n            ],\n        },\n    ]\n\n    data
      = await slack_post(\"chat.postMessage\", {\"channel\": channel_id, \"blocks\":
      blocks})\n    return data[\"ts\"]\n\n\nasync def handle_timeout(\n    request_id:
      str,\n    channel_id: str,\n    message_ts: str,\n    severity: str,\n    requesting_agent:
      str,\n    task_context: str,\n    proposed_action: str,\n    timeout_seconds:
      int,\n):\n    \"\"\"\n    Called after timeout expires. Auto-resolves based
      on severity:\n      low    → auto-approve  (safe to proceed)\n      medium →
      escalate      (re-post to escalation channel with @here)\n      high   → auto-reject
      \  (fail safe)\n    \"\"\"\n    await asyncio.sleep(timeout_seconds)\n\n    auto_outcome
      = TIMEOUT_ACTIONS[severity]\n    log.info(f\"Timeout for {request_id}: auto-{auto_outcome}\")\n\n
      \   # Update original message\n    timeout_note = {\n        \"approved\": \"⏱
      Auto-approved after timeout (low severity)\",\n        \"escalated\": \"⏱ Escalated
      after timeout — no response received\",\n        \"rejected\":  \"⏱ Auto-rejected
      after timeout (high severity — fail safe)\",\n    }[auto_outcome]\n\n    try:\n
      \       await slack_post(\"chat.update\", {\n            \"channel\": channel_id,\n
      \           \"ts\": message_ts,\n            \"blocks\": [\n                {\n
      \                   \"type\": \"section\",\n                    \"text\": {\n
      \                       \"type\": \"mrkdwn\",\n                        \"text\":
      (\n                            f\"\U0001F514 *HITL Approval Required* _(resolved)_\\n\"\n
      \                           f\"*Agent:* `{requesting_agent}`\\n\"\n                            f\"*Task:*
      {task_context}\\n\"\n                            f\"*Proposed Action:* {proposed_action}\"\n
      \                       ),\n                    },\n                },\n                {\n
      \                   \"type\": \"context\",\n                    \"elements\":
      [{\"type\": \"mrkdwn\", \"text\": timeout_note}],\n                },\n            ],\n
      \       })\n    except Exception as e:\n        log.error(f\"Failed to update
      timed-out message: {e}\")\n\n    # For escalation, re-post to escalation channel
      with @here\n    if auto_outcome == \"escalated\" and SLACK_ESCALATION_CHANNEL_ID
      != channel_id:\n        button_value = json.dumps({\n            \"request_id\":
      request_id,\n            \"context\": {\n                \"requesting_agent\":
      requesting_agent,\n                \"task_context\": task_context,\n                \"proposed_action\":
      proposed_action,\n            },\n        })\n        try:\n            await
      slack_post(\"chat.postMessage\", {\n                \"channel\": SLACK_ESCALATION_CHANNEL_ID,\n
      \               \"blocks\": [\n                    {\n                        \"type\":
      \"section\",\n                        \"text\": {\n                            \"type\":
      \"mrkdwn\",\n                            \"text\": (\n                                f\"<!here>
      \U0001F6A8 *Escalated HITL — No response in {timeout_seconds // 60}min*\\n\"\n
      \                               f\"*Agent:* `{requesting_agent}`\\n\"\n                                f\"*Task:*
      {task_context}\\n\"\n                                f\"*Proposed Action:* {proposed_action}\"\n
      \                           ),\n                        },\n                    },\n
      \                   {\n                        \"type\": \"actions\",\n                        \"elements\":
      [\n                            {\n                                \"type\":
      \"button\",\n                                \"text\": {\"type\": \"plain_text\",
      \"text\": \"✅ Approve\"},\n                                \"style\": \"primary\",\n
      \                               \"action_id\": \"approved\",\n                                \"value\":
      button_value,\n                            },\n                            {\n
      \                               \"type\": \"button\",\n                                \"text\":
      {\"type\": \"plain_text\", \"text\": \"❌ Reject\"},\n                                \"style\":
      \"danger\",\n                                \"action_id\": \"rejected\",\n
      \                               \"value\": button_value,\n                            },\n
      \                       ],\n                    },\n                ],\n            })\n
      \       except Exception as e:\n            log.error(f\"Failed to post escalation
      message: {e}\")\n\n\n# ---------------------------------------------------------------------------\n#
      MCP Tools\n# ---------------------------------------------------------------------------\n\n@mcp.tool()\nasync
      def request_approval(\n    task_context: str,\n    proposed_action: str,\n    severity:
      str,\n    requesting_agent: str,\n) -> str:\n    \"\"\"\n    Post an approval
      request to #hitl-approvals in Slack.\n    The agent should stop after calling
      this and wait to be resumed\n    via a HITL_RESUME message from the commander.\n\n
      \   Args:\n        task_context:     What the agent is currently doing (e.g.
      \"Finding business targets in Nashville\")\n        proposed_action:  The specific
      action requiring approval (e.g. \"Send cold email to 47 contacts\")\n        severity:
      \        \"low\" | \"medium\" | \"high\"\n                          low    =
      auto-approve after 30min if no response\n                          medium =
      escalate after 15min if no response\n                          high   = auto-reject
      after 5min if no response (fail safe)\n        requesting_agent: Name of the
      calling agent (e.g. \"prospecting-agent\")\n\n    Returns:\n        request_id
      to include in any follow-up context\n    \"\"\"\n    severity = severity.lower()\n
      \   if severity not in TIMEOUTS:\n        severity = \"medium\"\n\n    request_id
      = str(uuid.uuid4())[:8]\n    timeout_seconds = TIMEOUTS[severity]\n\n    log.info(f\"HITL
      request {request_id} from {requesting_agent} (severity={severity})\")\n\n    #
      Post the message\n    message_ts = await post_approval_message(\n        channel_id=SLACK_HITL_CHANNEL_ID,\n
      \       request_id=request_id,\n        requesting_agent=requesting_agent,\n
      \       task_context=task_context,\n        proposed_action=proposed_action,\n
      \       severity=severity,\n        timeout_seconds=timeout_seconds,\n    )\n\n
      \   # Schedule timeout handler in background (fire-and-forget)\n    asyncio.create_task(\n
      \       handle_timeout(\n            request_id=request_id,\n            channel_id=SLACK_HITL_CHANNEL_ID,\n
      \           message_ts=message_ts,\n            severity=severity,\n            requesting_agent=requesting_agent,\n
      \           task_context=task_context,\n            proposed_action=proposed_action,\n
      \           timeout_seconds=timeout_seconds,\n        )\n    )\n\n    return
      (\n        f\"Approval request posted to Slack (request_id={request_id}, severity={severity}).\\n\"\n
      \       f\"Timeout: {timeout_seconds // 60}min → will auto-{TIMEOUT_ACTIONS[severity]}.\\n\"\n
      \       f\"STOP here and do not proceed until you receive a HITL_RESUME message.\"\n
      \   )\n\n\n@mcp.tool()\nasync def post_notification(\n    channel: str,\n    message:
      str,\n    requesting_agent: str,\n) -> str:\n    \"\"\"\n    Post a plain notification
      to a Slack channel (no approval needed).\n    Use for status updates, alerts,
      or informational messages.\n\n    Args:\n        channel:          Channel ID
      (e.g. C0XXXXXXX) or name (e.g. agent-workers)\n        message:          Message
      text (supports Slack mrkdwn formatting)\n        requesting_agent: Name of the
      calling agent\n    \"\"\"\n    await slack_post(\"chat.postMessage\", {\n        \"channel\":
      channel,\n        \"blocks\": [\n            {\n                \"type\": \"section\",\n
      \               \"text\": {\"type\": \"mrkdwn\", \"text\": message},\n            },\n
      \           {\n                \"type\": \"context\",\n                \"elements\":
      [\n                    {\"type\": \"mrkdwn\", \"text\": f\"From: `{requesting_agent}`\"}\n
      \               ],\n            },\n        ],\n    })\n    return f\"Notification
      posted to {channel}\"\n\n\n# ---------------------------------------------------------------------------\n#
      Entry point\n# ---------------------------------------------------------------------------\n\nif
      __name__ == \"__main__\":\n    import uvicorn\n    import anyio\n\n    PORT
      = int(os.getenv(\"HITL_TOOL_PORT\", \"8091\"))\n    app = mcp.streamable_http_app()\n
      \   config = uvicorn.Config(app, host=\"0.0.0.0\", port=PORT, log_level=\"info\")\n
      \   anyio.run(uvicorn.Server(config).serve)"
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: "{\"apiVersion\":\"v1\",\"data\":{\"server.py\":\"\\\"\\\"\\\"\\nslack_poster.py
        — MCP tools for posting HITL approval requests to Slack.\\n\\nAdd this to
        your existing search-tool-server or gmail-tool-server,\\nOR deploy as its
        own hitl-tool-server using the standard FastMCP template.\\n\\nEnv vars (add
        to the target deployment's K8s secret):\\n  SLACK_BOT_TOKEN         — xoxb-...\\n
        \ SLACK_HITL_CHANNEL_ID   — C0XXXXXXX (channel ID, not name)\\n  SLACK_ESCALATION_CHANNEL_ID
        — defaults to SLACK_HITL_CHANNEL_ID\\n  HITL_WEBHOOK_URL        — https://autobot-chi-tawny.vercel.app/api/hitl\\n
        \                           (used in escalation re-posts so agents know where
        acks go)\\n\\\"\\\"\\\"\\n\\nimport asyncio\\nimport json\\nimport logging\\nimport
        os\\nimport uuid\\nfrom datetime import datetime, timezone\\n\\nimport httpx\\nfrom
        mcp.server.fastmcp import FastMCP\\nfrom mcp.server.transport_security import
        TransportSecuritySettings\\n\\nlog = logging.getLogger(\\\"slack-poster\\\")\\n\\nSLACK_BOT_TOKEN
        = os.environ[\\\"SLACK_BOT_TOKEN\\\"]\\nSLACK_HITL_CHANNEL_ID = os.environ[\\\"SLACK_HITL_CHANNEL_ID\\\"]\\nSLACK_ESCALATION_CHANNEL_ID
        = os.getenv(\\n    \\\"SLACK_ESCALATION_CHANNEL_ID\\\", SLACK_HITL_CHANNEL_ID\\n)\\n\\n#
        Timeout seconds per severity level\\n# low   → auto-approve after timeout
        (non-blocking work)\\n# medium → escalate to escalation channel\\n# high   →
        auto-reject (potentially destructive action)\\nTIMEOUTS = {\\\"low\\\": 30
        * 60, \\\"medium\\\": 15 * 60, \\\"high\\\": 5 * 60}\\nTIMEOUT_ACTIONS = {\\\"low\\\":
        \\\"approved\\\", \\\"medium\\\": \\\"escalated\\\", \\\"high\\\": \\\"rejected\\\"}\\n\\nmcp
        = FastMCP(\\n    \\\"hitl-tool-server\\\",\\n    transport_security=TransportSecuritySettings(enable_dns_rebinding_protection=False),\\n)\\n\\n#
        ---------------------------------------------------------------------------\\n#
        Slack API helpers\\n# ---------------------------------------------------------------------------\\n\\nasync
        def slack_post(endpoint: str, body: dict) -\\u003e dict:\\n    async with
        httpx.AsyncClient() as client:\\n        resp = await client.post(\\n            f\\\"https://slack.com/api/{endpoint}\\\",\\n
        \           headers={\\n                \\\"Authorization\\\": f\\\"Bearer
        {SLACK_BOT_TOKEN}\\\",\\n                \\\"Content-Type\\\": \\\"application/json\\\",\\n
        \           },\\n            json=body,\\n            timeout=10,\\n        )\\n
        \       resp.raise_for_status()\\n        data = resp.json()\\n        if
        not data.get(\\\"ok\\\"):\\n            raise RuntimeError(f\\\"Slack API
        error: {data.get('error')}\\\")\\n        return data\\n\\n\\nasync def post_approval_message(\\n
        \   channel_id: str,\\n    request_id: str,\\n    requesting_agent: str,\\n
        \   task_context: str,\\n    proposed_action: str,\\n    severity: str,\\n
        \   timeout_seconds: int,\\n) -\\u003e str:\\n    \\\"\\\"\\\"Post the HITL
        approval message with buttons. Returns message timestamp.\\\"\\\"\\\"\\n\\n
        \   severity_emoji = {\\\"low\\\": \\\"\U0001F7E2\\\", \\\"medium\\\": \\\"\U0001F7E1\\\",
        \\\"high\\\": \\\"\U0001F534\\\"}.get(severity, \\\"⚪\\\")\\n\\n    # Value
        embedded in each button so the webhook knows what to resume\\n    button_value
        = json.dumps({\\n        \\\"request_id\\\": request_id,\\n        \\\"context\\\":
        {\\n            \\\"requesting_agent\\\": requesting_agent,\\n            \\\"task_context\\\":
        task_context,\\n            \\\"proposed_action\\\": proposed_action,\\n        },\\n
        \   })\\n\\n    blocks = [\\n        {\\n            \\\"type\\\": \\\"section\\\",\\n
        \           \\\"text\\\": {\\n                \\\"type\\\": \\\"mrkdwn\\\",\\n
        \               \\\"text\\\": (\\n                    f\\\"\U0001F514 *HITL
        Approval Required*\\\\n\\\"\\n                    f\\\"*Agent:* `{requesting_agent}`\\\\n\\\"\\n
        \                   f\\\"*Severity:* {severity_emoji} {severity.upper()}\\\\n\\\\n\\\"\\n
        \                   f\\\"*Task:* {task_context}\\\\n\\\"\\n                    f\\\"*Proposed
        Action:* {proposed_action}\\\"\\n                ),\\n            },\\n        },\\n
        \       {\\n            \\\"type\\\": \\\"context\\\",\\n            \\\"elements\\\":
        [\\n                {\\n                    \\\"type\\\": \\\"mrkdwn\\\",\\n
        \                   \\\"text\\\": f\\\"Request ID: `{request_id}` | Timeout:
        {timeout_seconds // 60}min\\\",\\n                }\\n            ],\\n        },\\n
        \       {\\n            \\\"type\\\": \\\"actions\\\",\\n            \\\"elements\\\":
        [\\n                {\\n                    \\\"type\\\": \\\"button\\\",\\n
        \                   \\\"text\\\": {\\\"type\\\": \\\"plain_text\\\", \\\"text\\\":
        \\\"✅ Approve\\\"},\\n                    \\\"style\\\": \\\"primary\\\",\\n
        \                   \\\"action_id\\\": \\\"approved\\\",\\n                    \\\"value\\\":
        button_value,\\n                },\\n                {\\n                    \\\"type\\\":
        \\\"button\\\",\\n                    \\\"text\\\": {\\\"type\\\": \\\"plain_text\\\",
        \\\"text\\\": \\\"❌ Reject\\\"},\\n                    \\\"style\\\": \\\"danger\\\",\\n
        \                   \\\"action_id\\\": \\\"rejected\\\",\\n                    \\\"value\\\":
        button_value,\\n                },\\n                {\\n                    \\\"type\\\":
        \\\"button\\\",\\n                    \\\"text\\\": {\\\"type\\\": \\\"plain_text\\\",
        \\\"text\\\": \\\"⬆️ Escalate\\\"},\\n                    \\\"action_id\\\":
        \\\"escalated\\\",\\n                    \\\"value\\\": button_value,\\n                },\\n
        \           ],\\n        },\\n    ]\\n\\n    data = await slack_post(\\\"chat.postMessage\\\",
        {\\\"channel\\\": channel_id, \\\"blocks\\\": blocks})\\n    return data[\\\"ts\\\"]\\n\\n\\nasync
        def handle_timeout(\\n    request_id: str,\\n    channel_id: str,\\n    message_ts:
        str,\\n    severity: str,\\n    requesting_agent: str,\\n    task_context:
        str,\\n    proposed_action: str,\\n    timeout_seconds: int,\\n):\\n    \\\"\\\"\\\"\\n
        \   Called after timeout expires. Auto-resolves based on severity:\\n      low
        \   → auto-approve  (safe to proceed)\\n      medium → escalate      (re-post
        to escalation channel with @here)\\n      high   → auto-reject   (fail safe)\\n
        \   \\\"\\\"\\\"\\n    await asyncio.sleep(timeout_seconds)\\n\\n    auto_outcome
        = TIMEOUT_ACTIONS[severity]\\n    log.info(f\\\"Timeout for {request_id}:
        auto-{auto_outcome}\\\")\\n\\n    # Update original message\\n    timeout_note
        = {\\n        \\\"approved\\\": \\\"⏱ Auto-approved after timeout (low severity)\\\",\\n
        \       \\\"escalated\\\": \\\"⏱ Escalated after timeout — no response received\\\",\\n
        \       \\\"rejected\\\":  \\\"⏱ Auto-rejected after timeout (high severity
        — fail safe)\\\",\\n    }[auto_outcome]\\n\\n    try:\\n        await slack_post(\\\"chat.update\\\",
        {\\n            \\\"channel\\\": channel_id,\\n            \\\"ts\\\": message_ts,\\n
        \           \\\"blocks\\\": [\\n                {\\n                    \\\"type\\\":
        \\\"section\\\",\\n                    \\\"text\\\": {\\n                        \\\"type\\\":
        \\\"mrkdwn\\\",\\n                        \\\"text\\\": (\\n                            f\\\"\U0001F514
        *HITL Approval Required* _(resolved)_\\\\n\\\"\\n                            f\\\"*Agent:*
        `{requesting_agent}`\\\\n\\\"\\n                            f\\\"*Task:* {task_context}\\\\n\\\"\\n
        \                           f\\\"*Proposed Action:* {proposed_action}\\\"\\n
        \                       ),\\n                    },\\n                },\\n
        \               {\\n                    \\\"type\\\": \\\"context\\\",\\n
        \                   \\\"elements\\\": [{\\\"type\\\": \\\"mrkdwn\\\", \\\"text\\\":
        timeout_note}],\\n                },\\n            ],\\n        })\\n    except
        Exception as e:\\n        log.error(f\\\"Failed to update timed-out message:
        {e}\\\")\\n\\n    # For escalation, re-post to escalation channel with @here\\n
        \   if auto_outcome == \\\"escalated\\\" and SLACK_ESCALATION_CHANNEL_ID !=
        channel_id:\\n        button_value = json.dumps({\\n            \\\"request_id\\\":
        request_id,\\n            \\\"context\\\": {\\n                \\\"requesting_agent\\\":
        requesting_agent,\\n                \\\"task_context\\\": task_context,\\n
        \               \\\"proposed_action\\\": proposed_action,\\n            },\\n
        \       })\\n        try:\\n            await slack_post(\\\"chat.postMessage\\\",
        {\\n                \\\"channel\\\": SLACK_ESCALATION_CHANNEL_ID,\\n                \\\"blocks\\\":
        [\\n                    {\\n                        \\\"type\\\": \\\"section\\\",\\n
        \                       \\\"text\\\": {\\n                            \\\"type\\\":
        \\\"mrkdwn\\\",\\n                            \\\"text\\\": (\\n                                f\\\"\\u003c!here\\u003e
        \U0001F6A8 *Escalated HITL — No response in {timeout_seconds // 60}min*\\\\n\\\"\\n
        \                               f\\\"*Agent:* `{requesting_agent}`\\\\n\\\"\\n
        \                               f\\\"*Task:* {task_context}\\\\n\\\"\\n                                f\\\"*Proposed
        Action:* {proposed_action}\\\"\\n                            ),\\n                        },\\n
        \                   },\\n                    {\\n                        \\\"type\\\":
        \\\"actions\\\",\\n                        \\\"elements\\\": [\\n                            {\\n
        \                               \\\"type\\\": \\\"button\\\",\\n                                \\\"text\\\":
        {\\\"type\\\": \\\"plain_text\\\", \\\"text\\\": \\\"✅ Approve\\\"},\\n                                \\\"style\\\":
        \\\"primary\\\",\\n                                \\\"action_id\\\": \\\"approved\\\",\\n
        \                               \\\"value\\\": button_value,\\n                            },\\n
        \                           {\\n                                \\\"type\\\":
        \\\"button\\\",\\n                                \\\"text\\\": {\\\"type\\\":
        \\\"plain_text\\\", \\\"text\\\": \\\"❌ Reject\\\"},\\n                                \\\"style\\\":
        \\\"danger\\\",\\n                                \\\"action_id\\\": \\\"rejected\\\",\\n
        \                               \\\"value\\\": button_value,\\n                            },\\n
        \                       ],\\n                    },\\n                ],\\n
        \           })\\n        except Exception as e:\\n            log.error(f\\\"Failed
        to post escalation message: {e}\\\")\\n\\n\\n# ---------------------------------------------------------------------------\\n#
        MCP Tools\\n# ---------------------------------------------------------------------------\\n\\n@mcp.tool()\\nasync
        def request_approval(\\n    task_context: str,\\n    proposed_action: str,\\n
        \   severity: str,\\n    requesting_agent: str,\\n) -\\u003e str:\\n    \\\"\\\"\\\"\\n
        \   Post an approval request to #hitl-approvals in Slack.\\n    The agent
        should stop after calling this and wait to be resumed\\n    via a HITL_RESUME
        message from the commander.\\n\\n    Args:\\n        task_context:     What
        the agent is currently doing (e.g. \\\"Finding business targets in Nashville\\\")\\n
        \       proposed_action:  The specific action requiring approval (e.g. \\\"Send
        cold email to 47 contacts\\\")\\n        severity:         \\\"low\\\" | \\\"medium\\\"
        | \\\"high\\\"\\n                          low    = auto-approve after 30min
        if no response\\n                          medium = escalate after 15min if
        no response\\n                          high   = auto-reject after 5min if
        no response (fail safe)\\n        requesting_agent: Name of the calling agent
        (e.g. \\\"prospecting-agent\\\")\\n\\n    Returns:\\n        request_id to
        include in any follow-up context\\n    \\\"\\\"\\\"\\n    severity = severity.lower()\\n
        \   if severity not in TIMEOUTS:\\n        severity = \\\"medium\\\"\\n\\n
        \   request_id = str(uuid.uuid4())[:8]\\n    timeout_seconds = TIMEOUTS[severity]\\n\\n
        \   log.info(f\\\"HITL request {request_id} from {requesting_agent} (severity={severity})\\\")\\n\\n
        \   # Post the message\\n    message_ts = await post_approval_message(\\n
        \       channel_id=SLACK_HITL_CHANNEL_ID,\\n        request_id=request_id,\\n
        \       requesting_agent=requesting_agent,\\n        task_context=task_context,\\n
        \       proposed_action=proposed_action,\\n        severity=severity,\\n        timeout_seconds=timeout_seconds,\\n
        \   )\\n\\n    # Schedule timeout handler in background (fire-and-forget)\\n
        \   asyncio.create_task(\\n        handle_timeout(\\n            request_id=request_id,\\n
        \           channel_id=SLACK_HITL_CHANNEL_ID,\\n            message_ts=message_ts,\\n
        \           severity=severity,\\n            requesting_agent=requesting_agent,\\n
        \           task_context=task_context,\\n            proposed_action=proposed_action,\\n
        \           timeout_seconds=timeout_seconds,\\n        )\\n    )\\n\\n    return
        (\\n        f\\\"Approval request posted to Slack (request_id={request_id},
        severity={severity}).\\\\n\\\"\\n        f\\\"Timeout: {timeout_seconds //
        60}min → will auto-{TIMEOUT_ACTIONS[severity]}.\\\\n\\\"\\n        f\\\"STOP
        here and do not proceed until you receive a HITL_RESUME message.\\\"\\n    )\\n\\n\\n@mcp.tool()\\nasync
        def post_notification(\\n    channel: str,\\n    message: str,\\n    requesting_agent:
        str,\\n) -\\u003e str:\\n    \\\"\\\"\\\"\\n    Post a plain notification
        to a Slack channel (no approval needed).\\n    Use for status updates, alerts,
        or informational messages.\\n\\n    Args:\\n        channel:          Channel
        ID (e.g. C0XXXXXXX) or name (e.g. agent-workers)\\n        message:          Message
        text (supports Slack mrkdwn formatting)\\n        requesting_agent: Name of
        the calling agent\\n    \\\"\\\"\\\"\\n    await slack_post(\\\"chat.postMessage\\\",
        {\\n        \\\"channel\\\": channel,\\n        \\\"blocks\\\": [\\n            {\\n
        \               \\\"type\\\": \\\"section\\\",\\n                \\\"text\\\":
        {\\\"type\\\": \\\"mrkdwn\\\", \\\"text\\\": message},\\n            },\\n
        \           {\\n                \\\"type\\\": \\\"context\\\",\\n                \\\"elements\\\":
        [\\n                    {\\\"type\\\": \\\"mrkdwn\\\", \\\"text\\\": f\\\"From:
        `{requesting_agent}`\\\"}\\n                ],\\n            },\\n        ],\\n
        \   })\\n    return f\\\"Notification posted to {channel}\\\"\\n\\n\\n# ---------------------------------------------------------------------------\\n#
        Entry point\\n# ---------------------------------------------------------------------------\\n\\nif
        __name__ == \\\"__main__\\\":\\n    import uvicorn\\n    import anyio\\n\\n
        \   PORT = int(os.getenv(\\\"HITL_TOOL_PORT\\\", \\\"8091\\\"))\\n    app
        = mcp.streamable_http_app()\\n    config = uvicorn.Config(app, host=\\\"0.0.0.0\\\",
        port=PORT, log_level=\\\"info\\\")\\n    anyio.run(uvicorn.Server(config).serve)\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"creationTimestamp\":null,\"name\":\"hitl-tool-server-code\",\"namespace\":\"kagent\"}}\n"
