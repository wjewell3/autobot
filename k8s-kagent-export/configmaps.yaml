        exceed hard limits\\n\\nBudget config lives in /etc/governor/budgets.yaml
        — deterministic\\nlimits that cannot be prompt-injected away.\\n\\\"\\\"\\\"\\n\\nimport
        asyncio\\nimport json\\nimport logging\\nimport os\\nimport sys\\nfrom datetime
        import datetime, timezone\\nfrom collections import defaultdict\\n\\nimport
        httpx\\nimport yaml\\nfrom mcp.server.fastmcp import FastMCP\\nfrom mcp.server.transport_security
        import TransportSecuritySettings\\n\\nlogging.basicConfig(\\n    level=logging.INFO,\\n
        \   format=\\\"%(asctime)s %(levelname)s %(message)s\\\",\\n    stream=sys.stdout,\\n)\\nlog
        = logging.getLogger(\\\"resource-governor\\\")\\n\\nBUDGET_PATH = \\\"/etc/governor/budgets.yaml\\\"\\nLITELLM_URL
        = os.getenv(\\n    \\\"LITELLM_URL\\\", \\\"http://litellm-service.kagent.svc.cluster.local:4000\\\"\\n)\\nAUDIT_URL
        = os.getenv(\\n    \\\"AUDIT_LOGGER_URL\\\", \\\"http://audit-logger.kagent.svc.cluster.local:8092\\\"\\n)\\nSLACK_BOT_TOKEN
        = os.getenv(\\\"SLACK_BOT_TOKEN\\\", \\\"\\\")\\nSLACK_ALERT_CHANNEL = os.getenv(\\\"SLACK_ALERT_CHANNEL_ID\\\",
        \\\"\\\")\\nCHECK_INTERVAL = int(os.getenv(\\\"CHECK_INTERVAL_SECONDS\\\",
        \\\"60\\\"))\\n\\nmcp = FastMCP(\\n    \\\"resource-governor\\\",\\n    transport_security=TransportSecuritySettings(enable_dns_rebinding_protection=False),\\n)\\n\\n#
