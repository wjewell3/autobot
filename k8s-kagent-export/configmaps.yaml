      \   )\n\n\n@mcp.tool()\nasync def post_notification(\n    channel: str,\n    message:
      str,\n    requesting_agent: str,\n) -> str:\n    \"\"\"\n    Post a plain notification
      to a Slack channel (no approval needed).\n    Use for status updates, alerts,
      or informational messages.\n\n    Args:\n        channel:          Channel ID
      (e.g. C0XXXXXXX) or name (e.g. agent-workers)\n        message:          Message
      text (supports Slack mrkdwn formatting)\n        requesting_agent: Name of the
      calling agent\n    \"\"\"\n    await slack_post(\"chat.postMessage\", {\n        \"channel\":
      channel,\n        \"blocks\": [\n            {\n                \"type\": \"section\",\n
      \               \"text\": {\"type\": \"mrkdwn\", \"text\": message},\n            },\n
      \           {\n                \"type\": \"context\",\n                \"elements\":
      [\n                    {\"type\": \"mrkdwn\", \"text\": f\"From: `{requesting_agent}`\"}\n
      \               ],\n            },\n        ],\n    })\n    return f\"Notification
