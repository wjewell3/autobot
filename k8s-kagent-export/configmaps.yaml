    server.py: |
      from fastapi import FastAPI
      from fastapi.responses import HTMLResponse
      import json, uvicorn, uuid, os
      from datetime import datetime

      app = FastAPI()
      approvals = {}

      VERCEL_URL = os.environ.get("VERCEL_URL", "https://autobot-chi-tawny.vercel.app")

      @app.post("/approval/create")
      async def create_approval(request: dict):
          token = str(uuid.uuid4())
          business = request.get("business", "")
          repo = request.get("repo", "")
          approvals[token] = {
              "status": "PENDING",
              "subject": request.get("subject", ""),
              "details": request.get("details", ""),
              "business": business,
              "repo": repo,
              "created_at": datetime.utcnow().isoformat()
          }
          approve_url = f"{VERCEL_URL}/api/approve?token={token}&action=yes&business={business}&repo={repo}"
          reject_url = f"{VERCEL_URL}/api/approve?token={token}&action=no&business={business}&repo={repo}"
          email_html = f"""
      <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #ffffff;">
        <div style="background: #0f172a; padding: 20px; border-radius: 12px 12px 0 0; text-align: center;">
          <h1 style="color: #a78bfa; margin: 0; font-size: 24px; letter-spacing: 3px;">AUTOBOT</h1>
          <p style="color: #475569; margin: 4px 0 0; font-size: 12px;">COMMAND CENTER</p>
        </div>
        <div style="border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 12px 12px; padding: 24px;">
          <h2 style="color: #1e293b; margin-top: 0;">{request.get("subject", "")}</h2>
          <div style="background: #f8fafc; border-left: 4px solid #a78bfa; padding: 16px; border-radius: 4px; margin: 20px 0;">
            <pre style="white-space: pre-wrap; font-size: 13px; color: #334155; margin: 0; font-family: Arial, sans-serif;">{request.get("details", "")}</pre>
          </div>
          <div style="margin: 32px 0; text-align: center;">
            <a href="{approve_url}" style="background: #22c55e; color: white; padding: 16px 40px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: bold; margin-right: 12px; display: inline-block;">
              ✅ APPROVE &amp; DEPLOY
            </a>
            <a href="{reject_url}" style="background: #ef4444; color: white; padding: 16px 40px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: bold; display: inline-block;">
              ❌ REJECT
            </a>
          </div>
          <p style="color: #94a3b8; font-size: 12px; text-align: center;">Sent by Autobot — clicking APPROVE will automatically deploy the site</p>
        </div>
      </div>"""
          print(f"[create] token={token} business={business}")
          return {"token": token, "approve_url": approve_url, "reject_url": reject_url, "email_html": email_html}

      @app.get("/approval/respond")
      async def respond(token: str, action: str):
          if token not in approvals:
              return {"status": "NOT_FOUND"}
          decision = "APPROVED" if action.lower() in ["yes", "approve", "y"] else "REJECTED"
          approvals[token]["status"] = decision
          approvals[token]["decided_at"] = datetime.utcnow().isoformat()
          print(f"[respond] token={token} decision={decision}")
          return {"status": decision}

      @app.get("/approval/status")
      async def status(token: str):
          if token not in approvals:
              return {"status": "NOT_FOUND"}
          return approvals[token]

      @app.get("/approval/list")
      async def list_approvals():
          return {"approvals": approvals}

      if __name__ == "__main__":
          uvicorn.run(app, host="0.0.0.0", port=8089)
