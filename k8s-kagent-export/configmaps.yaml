font-family: Arial, sans-serif;\"\u003e{request.get(\"details\", \"\")}\u003c/pre\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"margin: 32px 0; text-align: center;\"\u003e\n      \u003ca href=\"{approve_url}\" style=\"background: #22c55e; color: white; padding: 16px 40px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: bold; margin-right: 12px; display: inline-block;\"\u003e\n        ✅ APPROVE \u0026amp; DEPLOY\n      \u003c/a\u003e\n      \u003ca href=\"{reject_url}\" style=\"background: #ef4444; color: white; padding: 16px 40px; border-radius: 8px; text-decoration: none; font-size: 16px; font-weight: bold; display: inline-block;\"\u003e\n        ❌ REJECT\n      \u003c/a\u003e\n    \u003c/div\u003e\n    \u003cp style=\"color: #94a3b8; font-size: 12px; text-align: center;\"\u003eSent by Autobot — clicking APPROVE will automatically deploy the site\u003c/p\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\"\"\"\n    print(f\"[create] token={token} business={business}\")\n    return {\"token\": token, \"approve_url\": approve_url, \"reject_url\": reject_url, \"email_html\": email_html}\n\n@app.get(\"/approval/respond\")\nasync def respond(token: str, action: str):\n    if token not in approvals:\n        return {\"status\": \"NOT_FOUND\"}\n    decision = \"APPROVED\" if action.lower() in [\"yes\", \"approve\", \"y\"] else \"REJECTED\"\n    approvals[token][\"status\"] = decision\n    approvals[token][\"decided_at\"] = datetime.utcnow().isoformat()\n    print(f\"[respond] token={token} decision={decision}\")\n    return {\"status\": decision}\n\n@app.get(\"/approval/status\")\nasync def status(token: str):\n    if token not in approvals:\n        return {\"status\": \"NOT_FOUND\"}\n    return approvals[token]\n\n@app.get(\"/approval/list\")\nasync def list_approvals():\n    return {\"approvals\": approvals}\n\nif __name__ == \"__main__\":\n    uvicorn.run(app, host=\"0.0.0.0\", port=8089)\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"approval-server","namespace":"kagent"}}
