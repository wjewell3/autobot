- apiVersion: v1
  data:
    capability-registry.yaml: |
      # ── Capability Registry ──────────────────────────────────
      # This file defines EXACTLY which agents can exist and what
      # tools each one is allowed to use. The admission webhook
      # reads this on every Agent CREATE/UPDATE.
      #
      # To update: edit this file, then:
      #   kubectl create configmap capability-registry \
      #     --from-file=capability-registry.yaml=infra/phase1-admission-control/capability-registry.yaml \
      #     -n kagent --dry-run=client -o yaml | kubectl apply -f -
      #   kubectl delete pod -l app=agent-policy-server -n kagent
      #
      # IMPORTANT: This is the ONLY place where agent permissions
      # are defined. Prompt-level instructions are a SECOND layer,
      # not the primary control.
      #
      # NOTE: khook auto-syncs commander-agent with A2A tools for
      # every agent in the namespace. The commander entry below must
      # list all agents in allowed_agent_calls to avoid blocking
      # khook's sync. MCP tools are the real control surface.
      # ─────────────────────────────────────────────────────────

      # Enforcement mode: "enforce" = block violations, "audit" = log only
      # Switched to enforce on 2026-03-26 after CSO cleanup verified the registry is clean.
      enforcement_mode: enforce

      # Hard cap on total agents in namespace. Prevents runaway creation.
      max_agents: 25

      # If false, any agent not listed below is REJECTED on create/update.
      allow_unlisted_agents: false

      # If true, agents with MCP tools must have label "hitl-reviewed: true".
      # Only a human operator can add this label via kubectl.
      require_hitl_label_for_mcp: true

      # These tools are BLOCKED for ALL agents, no exceptions.
      forbidden_tools:
        - gmail_send_email

      # ── Per-Agent Permissions ────────────────────────────────
      allowed_agents:

        # ── Commander (thin router) ─────────────────────────────
        # khook auto-adds A2A for all agents + MCP from all servers.
        # We allow the full khook set EXCEPT:
        #   - gmail_send_email (forbidden globally)
        #   - k8s_apply_manifest / k8s_create_resource (deployment is human-only)
        #   - github_merge_pr (merges must go through HITL flow via hitl.js, not direct)
        # Commander is a ROUTER. It delegates to C-suite who delegate further.
        # It should never unilaterally deploy, delete, or merge.
        commander-agent:
          description: "Thin router — dispatches to C-suite agents; no unilateral cluster writes or PR merges"
          allowed_tools:
            - kagent-tool-server/k8s_get_resources
            - kagent-tool-server/k8s_describe_resource
            - kagent-tool-server/k8s_get_resource_yaml
            - search-tool-server/search_web
            - search-tool-server/search_news
            - search-tool-server/search_find_businesses
            - github-tool-server/github_list_repos
            - github-tool-server/github_list_issues
            - github-tool-server/github_get_issue
            - github-tool-server/github_list_prs
            - gmail-tool-server/gmail_request_approval
            - gmail-tool-server/gmail_check_approval
            - hitl-tool-server/request_approval
            - hitl-tool-server/post_notification
            - audit-logger/write_audit
            - audit-logger/get_recent_audit
            - resource-governor/check_budget
            - resource-governor/get_system_status
          allowed_agent_calls:
            - ceo-agent
            - coo-agent
            - cso-agent
            - cfo-agent
            - pm-agent
            - prospecting-agent
            - site-builder-agent
            - outreach-agent
            - rd-agent
            - north-star-agent
            - codegen-agent

        # ── C-Suite ────────────────────────────────────────────

        ceo-agent:
          description: "Vision and strategy — no tools, pure reasoning"
          allowed_tools: []
          allowed_agent_calls: []

        cfo-agent:
          description: "Resource monitor — token limits, cluster health, budget enforcement"
          allowed_tools:
            - resource-governor/check_budget
            - resource-governor/get_system_status
            - kagent-tool-server/k8s_get_resources
            - kagent-tool-server/k8s_delete_resource
            - audit-logger/get_recent_audit
            - audit-logger/write_audit
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        coo-agent:
          description: "Operations oversight — audit read + Slack"
          allowed_tools:
            - audit-logger/get_recent_audit
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        cso-agent:
          description: "Security enforcement — audit + HITL-gated remediation"
          allowed_tools:
            - kagent-tool-server/k8s_get_resources
            - kagent-tool-server/k8s_describe_resource
            - kagent-tool-server/k8s_get_resource_yaml
            - kagent-tool-server/k8s_delete_resource
            - kagent-tool-server/k8s_patch_resource
            - audit-logger/get_recent_audit
            - audit-logger/write_audit
            - hitl-tool-server/request_approval
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        pm-agent:
          description: "Project manager — delegates to workers, tracks backlog via GitHub Issues"
          allowed_tools:
            - github-tool-server/github_create_issue
            - github-tool-server/github_list_issues
            - github-tool-server/github_get_issue
            - github-tool-server/github_update_issue
            - github-tool-server/github_add_comment
            - audit-logger/write_audit
            - audit-logger/get_recent_audit
            - hitl-tool-server/post_notification
            - hitl-tool-server/request_approval
            - playbook-server/get_playbook
            - playbook-server/get_stage_config
            - playbook-server/get_niche_rotation
            - playbook-server/get_qualification_rules
            - shared-state/state_get
            - shared-state/state_set
            - shared-state/state_list
            - shared-state/pipeline_status
            - rules-engine/check_rule
          allowed_agent_calls:
            - prospecting-agent
            - site-builder-agent
            - outreach-agent

        # ── Workers ────────────────────────────────────────────

        prospecting-agent:
          description: "Finds local businesses that need websites"
          allowed_tools:
            - search-tool-server/search_find_businesses
            - search-tool-server/search_web
            - audit-logger/write_audit
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        site-builder-agent:
          description: "Creates GitHub Pages sites for businesses"
          allowed_tools:
            - github-tool-server/github_create_repo
            - github-tool-server/github_push_file
            - github-tool-server/github_enable_pages
            - github-tool-server/github_get_pages_url
            - github-tool-server/github_create_branch
            - audit-logger/write_audit
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        outreach-agent:
          description: "Sends HITL-gated outreach emails with demo site URLs (POC: sends to operator only)"
          allowed_tools:
            - gmail-tool-server/gmail_send_email   # overrides forbidden_tools — HITL-gated, POC sends only to operator
            - audit-logger/write_audit
            - hitl-tool-server/request_approval
            - hitl-tool-server/post_notification
          allowed_agent_calls: []

        # ── R&D ────────────────────────────────────────────────

        rd-agent:
          description: "Researches best practices and proposes agent improvements via GitHub PRs"
          allowed_tools:
            - search-tool-server/search_web
            - kagent-tool-server/k8s_get_resources
            - kagent-tool-server/k8s_get_resource_yaml
            - github-tool-server/github_create_branch
            - github-tool-server/github_push_file
            - github-tool-server/github_create_pr
            - github-tool-server/github_list_prs
            - hardening-agent/get_failure_patterns
            - hardening-agent/get_patterns
            - hardening-agent/get_active_rules
            - audit-logger/write_audit
            - audit-logger/get_recent_audit
            - hitl-tool-server/post_notification
            - hitl-tool-server/request_approval
            - eval-harness/compare_eval
            - eval-harness/get_baseline
            - eval-harness/set_baseline
          allowed_agent_calls: []

        # ── North Star ─────────────────────────────────────────

        north-star-agent:
          description: "Trajectory assessor — compares system evolution against project_summary.md gold standard; creates gap-fixing PRs via HITL"
          allowed_tools:
            - kagent-tool-server/k8s_get_resources
            - kagent-tool-server/k8s_get_resource_yaml
            - audit-logger/get_recent_audit
            - audit-logger/write_audit
            - hardening-agent/get_patterns
            - hardening-agent/get_active_rules
            - github-tool-server/github_list_prs
            - github-tool-server/github_list_issues
            - github-tool-server/github_get_issue
            - github-tool-server/github_create_branch
            - github-tool-server/github_push_file
            - github-tool-server/github_create_pr
            - search-tool-server/search_web
            - hitl-tool-server/post_notification
            - hitl-tool-server/request_approval
            - eval-harness/run_eval
            - eval-harness/list_suites
            - eval-harness/compare_eval
            - rules-engine/get_rule_stats
            - shared-state/pipeline_status
            - adversarial-tester/get_coverage_report
          allowed_agent_calls: []

        # ── Future Workers (uncomment when ready to deploy) ────

        # ── Phase 10: LLM Distillation ────────────────────────

        codegen-agent:
          description: "Systematically eliminates LLM calls fleet-wide by compiling repeatable agent tasks into deterministic Python microservices. Works through a priority queue, inner test loop, HITL gating, and immutable service locks."
          allowed_tools:
            # Queue + lock state management
            - shared-state/state_get
            - shared-state/state_set
            - shared-state/state_list
            # Core codegen tools — test runner + deployer
            - codegen-mcp/run_test_suite
            - codegen-mcp/deploy_microservice
            - codegen-mcp/lock_service
            - codegen-mcp/get_lock_status
            # Read target agent system messages from cluster
            - kagent-tool-server/k8s_get_resource_yaml
            - kagent-tool-server/k8s_get_resources
            # Push service code and integration PRs to GitHub
            - github-tool-server/github_create_branch
            - github-tool-server/github_push_file
            - github-tool-server/github_create_pr
            - github-tool-server/github_list_prs
            # Quality gate before HITL
            - eval-harness/run_eval
            - eval-harness/compare_eval
            - eval-harness/get_baseline
            # HITL — surface for approval + notify on deployment
            - hitl-tool-server/request_approval
            - hitl-tool-server/post_notification
            # Audit trail
            - audit-logger/write_audit
            - audit-logger/get_recent_audit
          allowed_agent_calls: []
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"capability-registry.yaml":"# ── Capability Registry ──────────────────────────────────\n# This file defines EXACTLY which agents can exist and what\n# tools each one is allowed to use. The admission webhook\n# reads this on every Agent CREATE/UPDATE.\n#\n# To update: edit this file, then:\n#   kubectl create configmap capability-registry \\\n#     --from-file=capability-registry.yaml=infra/phase1-admission-control/capability-registry.yaml \\\n#     -n kagent --dry-run=client -o yaml | kubectl apply -f -\n#   kubectl delete pod -l app=agent-policy-server -n kagent\n#\n# IMPORTANT: This is the ONLY place where agent permissions\n# are defined. Prompt-level instructions are a SECOND layer,\n# not the primary control.\n#\n# NOTE: khook auto-syncs commander-agent with A2A tools for\n# every agent in the namespace. The commander entry below must\n# list all agents in allowed_agent_calls to avoid blocking\n# khook's sync. MCP tools are the real control surface.\n# ─────────────────────────────────────────────────────────\n\n# Enforcement mode: \"enforce\" = block violations, \"audit\" = log only\n# Switched to enforce on 2026-03-26 after CSO cleanup verified the registry is clean.\nenforcement_mode: enforce\n\n# Hard cap on total agents in namespace. Prevents runaway creation.\nmax_agents: 25\n\n# If false, any agent not listed below is REJECTED on create/update.\nallow_unlisted_agents: false\n\n# If true, agents with MCP tools must have label \"hitl-reviewed: true\".\n# Only a human operator can add this label via kubectl.\nrequire_hitl_label_for_mcp: true\n\n# These tools are BLOCKED for ALL agents, no exceptions.\nforbidden_tools:\n  - gmail_send_email\n\n# ── Per-Agent Permissions ────────────────────────────────\nallowed_agents:\n\n  # ── Commander (thin router) ─────────────────────────────\n  # khook auto-adds A2A for all agents + MCP from all servers.\n  # We allow the full khook set EXCEPT:\n  #   - gmail_send_email (forbidden globally)\n  #   - k8s_apply_manifest / k8s_create_resource (deployment is human-only)\n  #   - github_merge_pr (merges must go through HITL flow via hitl.js, not direct)\n  # Commander is a ROUTER. It delegates to C-suite who delegate further.\n  # It should never unilaterally deploy, delete, or merge.\n  commander-agent:\n    description: \"Thin router — dispatches to C-suite agents; no unilateral cluster writes or PR merges\"\n    allowed_tools:\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_describe_resource\n      - kagent-tool-server/k8s_get_resource_yaml\n      - search-tool-server/search_web\n      - search-tool-server/search_news\n      - search-tool-server/search_find_businesses\n      - github-tool-server/github_list_repos\n      - github-tool-server/github_list_issues\n      - github-tool-server/github_get_issue\n      - github-tool-server/github_list_prs\n      - gmail-tool-server/gmail_request_approval\n      - gmail-tool-server/gmail_check_approval\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n      - resource-governor/check_budget\n      - resource-governor/get_system_status\n    allowed_agent_calls:\n      - ceo-agent\n      - coo-agent\n      - cso-agent\n      - cfo-agent\n      - pm-agent\n      - prospecting-agent\n      - site-builder-agent\n      - outreach-agent\n      - rd-agent\n      - north-star-agent\n      - codegen-agent\n\n  # ── C-Suite ────────────────────────────────────────────\n\n  ceo-agent:\n    description: \"Vision and strategy — no tools, pure reasoning\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  cfo-agent:\n    description: \"Resource monitor — token limits, cluster health, budget enforcement\"\n    allowed_tools:\n      - resource-governor/check_budget\n      - resource-governor/get_system_status\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_delete_resource\n      - audit-logger/get_recent_audit\n      - audit-logger/write_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  coo-agent:\n    description: \"Operations oversight — audit read + Slack\"\n    allowed_tools:\n      - audit-logger/get_recent_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  cso-agent:\n    description: \"Security enforcement — audit + HITL-gated remediation\"\n    allowed_tools:\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_describe_resource\n      - kagent-tool-server/k8s_get_resource_yaml\n      - kagent-tool-server/k8s_delete_resource\n      - kagent-tool-server/k8s_patch_resource\n      - audit-logger/get_recent_audit\n      - audit-logger/write_audit\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  pm-agent:\n    description: \"Project manager — delegates to workers, tracks backlog via GitHub Issues\"\n    allowed_tools:\n      - github-tool-server/github_create_issue\n      - github-tool-server/github_list_issues\n      - github-tool-server/github_get_issue\n      - github-tool-server/github_update_issue\n      - github-tool-server/github_add_comment\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n      - hitl-tool-server/post_notification\n      - hitl-tool-server/request_approval\n      - playbook-server/get_playbook\n      - playbook-server/get_stage_config\n      - playbook-server/get_niche_rotation\n      - playbook-server/get_qualification_rules\n      - shared-state/state_get\n      - shared-state/state_set\n      - shared-state/state_list\n      - shared-state/pipeline_status\n      - rules-engine/check_rule\n    allowed_agent_calls:\n      - prospecting-agent\n      - site-builder-agent\n      - outreach-agent\n\n  # ── Workers ────────────────────────────────────────────\n\n  prospecting-agent:\n    description: \"Finds local businesses that need websites\"\n    allowed_tools:\n      - search-tool-server/search_find_businesses\n      - search-tool-server/search_web\n      - audit-logger/write_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  site-builder-agent:\n    description: \"Creates GitHub Pages sites for businesses\"\n    allowed_tools:\n      - github-tool-server/github_create_repo\n      - github-tool-server/github_push_file\n      - github-tool-server/github_enable_pages\n      - github-tool-server/github_get_pages_url\n      - github-tool-server/github_create_branch\n      - audit-logger/write_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  outreach-agent:\n    description: \"Sends HITL-gated outreach emails with demo site URLs (POC: sends to operator only)\"\n    allowed_tools:\n      - gmail-tool-server/gmail_send_email   # overrides forbidden_tools — HITL-gated, POC sends only to operator\n      - audit-logger/write_audit\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  # ── R\u0026D ────────────────────────────────────────────────\n\n  rd-agent:\n    description: \"Researches best practices and proposes agent improvements via GitHub PRs\"\n    allowed_tools:\n      - search-tool-server/search_web\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_get_resource_yaml\n      - github-tool-server/github_create_branch\n      - github-tool-server/github_push_file\n      - github-tool-server/github_create_pr\n      - github-tool-server/github_list_prs\n      - hardening-agent/get_failure_patterns\n      - hardening-agent/get_patterns\n      - hardening-agent/get_active_rules\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n      - hitl-tool-server/post_notification\n      - hitl-tool-server/request_approval\n      - eval-harness/compare_eval\n      - eval-harness/get_baseline\n      - eval-harness/set_baseline\n    allowed_agent_calls: []\n\n  # ── North Star ─────────────────────────────────────────\n\n  north-star-agent:\n    description: \"Trajectory assessor — compares system evolution against project_summary.md gold standard; creates gap-fixing PRs via HITL\"\n    allowed_tools:\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_get_resource_yaml\n      - audit-logger/get_recent_audit\n      - audit-logger/write_audit\n      - hardening-agent/get_patterns\n      - hardening-agent/get_active_rules\n      - github-tool-server/github_list_prs\n      - github-tool-server/github_list_issues\n      - github-tool-server/github_get_issue\n      - github-tool-server/github_create_branch\n      - github-tool-server/github_push_file\n      - github-tool-server/github_create_pr\n      - search-tool-server/search_web\n      - hitl-tool-server/post_notification\n      - hitl-tool-server/request_approval\n      - eval-harness/run_eval\n      - eval-harness/list_suites\n      - eval-harness/compare_eval\n      - rules-engine/get_rule_stats\n      - shared-state/pipeline_status\n      - adversarial-tester/get_coverage_report\n    allowed_agent_calls: []\n\n  # ── Future Workers (uncomment when ready to deploy) ────\n\n  # ── Phase 10: LLM Distillation ────────────────────────\n\n  codegen-agent:\n    description: \"Systematically eliminates LLM calls fleet-wide by compiling repeatable agent tasks into deterministic Python microservices. Works through a priority queue, inner test loop, HITL gating, and immutable service locks.\"\n    allowed_tools:\n      # Queue + lock state management\n      - shared-state/state_get\n      - shared-state/state_set\n      - shared-state/state_list\n      # Core codegen tools — test runner + deployer\n      - codegen-mcp/run_test_suite\n      - codegen-mcp/deploy_microservice\n      - codegen-mcp/lock_service\n      - codegen-mcp/get_lock_status\n      # Read target agent system messages from cluster\n      - kagent-tool-server/k8s_get_resource_yaml\n      - kagent-tool-server/k8s_get_resources\n      # Push service code and integration PRs to GitHub\n      - github-tool-server/github_create_branch\n      - github-tool-server/github_push_file\n      - github-tool-server/github_create_pr\n      - github-tool-server/github_list_prs\n      # Quality gate before HITL\n      - eval-harness/run_eval\n      - eval-harness/compare_eval\n      - eval-harness/get_baseline\n      # HITL — surface for approval + notify on deployment\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n      # Audit trail\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n    allowed_agent_calls: []\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"capability-registry","namespace":"kagent"}}
