        = os.getenv(\\n    \\\"GITHUB_MCP_URL\\\", \\\"http://github-mcp.kagent.svc.cluster.local:8087\\\"\\n)\\nGITHUB_REPO
        = os.getenv(\\\"GITHUB_REPO\\\", \\\"wjewell3/autobot\\\")\\nSLACK_BOT_TOKEN
        = os.getenv(\\\"SLACK_BOT_TOKEN\\\", \\\"\\\")\\nSLACK_PROPOSALS_CHANNEL =
        os.getenv(\\\"SLACK_PROPOSALS_CHANNEL_ID\\\", \\\"\\\")\\nRULES_PATH = \\\"/etc/hardening/rules.yaml\\\"\\nANALYSIS_INTERVAL
        = int(os.getenv(\\\"ANALYSIS_INTERVAL_SECONDS\\\", \\\"300\\\"))  # 5 min\\nPROPOSAL_THRESHOLD
        = int(os.getenv(\\\"PROPOSAL_THRESHOLD\\\", \\\"10\\\"))\\n\\nmcp = FastMCP(\\n
        \   \\\"hardening-agent\\\",\\n    transport_security=TransportSecuritySettings(enable_dns_rebinding_protection=False),\\n)\\n\\n#
        Track which patterns we've already proposed (avoid spam)\\nproposed_patterns:
        set[str] = set()\\n\\n\\nasync def call_mcp_tool(server_url: str, tool_name:
        str, arguments: dict) -\\u003e dict:\\n    \\\"\\\"\\\"Call a tool on an MCP
        server using the proper MCP client SDK.\\\"\\\"\\\"\\n    try:\\n        async
        with streamablehttp_client(f\\\"{server_url}/mcp\\\") as (read, write, _):\\n
        \           async with ClientSession(read, write) as session:\\n                await
        session.initialize()\\n                result = await session.call_tool(tool_name,
        arguments)\\n                if result.content:\\n                    text
        = result.content[0].text\\n                    try:\\n                        return
        json.loads(text)\\n                    except json.JSONDecodeError:\\n                        return
        {\\\"text\\\": text}\\n        return {\\\"error\\\": \\\"No content returned\\\"}\\n
        \   except Exception as e:\\n        log.error(f\\\"MCP call failed ({server_url}
        / {tool_name}): {e}\\\")\\n        return {\\\"error\\\": str(e)}\\n\\n\\nasync
        def create_pr_via_github_mcp(proposal_yaml: str, pattern_key: str) -\\u003e
        dict:\\n    \\\"\\\"\\\"Create a branch, push a proposal file, and open a
        PR via github-mcp.\\\"\\\"\\\"\\n    ts = int(time.time())\\n    branch_name
        = f\\\"hardening/proposal-{ts}\\\"\\n\\n    # 1. Create branch\\n    branch_result
        = await call_mcp_tool(GITHUB_MCP_URL, \\\"github_create_branch\\\", {\\n        \\\"repo\\\":
        GITHUB_REPO,\\n        \\\"branch\\\": branch_name,\\n        \\\"from_branch\\\":
        \\\"main\\\",\\n    })\\n    if \\\"error\\\" in branch_result:\\n        log.error(f\\\"Failed
        to create branch: {branch_result['error']}\\\")\\n        return branch_result\\n\\n
        \   # 2. Push proposal file to the new branch\\n    file_path = f\\\"infra/hardening-proposals/{pattern_key.replace(':',
        '-')}-{ts}.yaml\\\"\\n    push_result = await call_mcp_tool(GITHUB_MCP_URL,
        \\\"github_push_file\\\", {\\n        \\\"repo\\\": GITHUB_REPO,\\n        \\\"path\\\":
        file_path,\\n        \\\"content\\\": proposal_yaml,\\n        \\\"message\\\":
        f\\\"hardening: propose rule for {pattern_key}\\\",\\n        \\\"branch\\\":
        branch_name,\\n    })\\n    if \\\"error\\\" in push_result:\\n        log.error(f\\\"Failed
        to push file: {push_result['error']}\\\")\\n        return push_result\\n\\n
        \   # 3. Open PR\\n    pr_result = await call_mcp_tool(GITHUB_MCP_URL, \\\"github_create_pr\\\",
        {\\n        \\\"repo\\\": GITHUB_REPO,\\n        \\\"title\\\": f\\\"Hardening:
        propose rule for {pattern_key}\\\",\\n        \\\"body\\\": (\\n            f\\\"##
        Hardening Proposal\\\\n\\\\n\\\"\\n            f\\\"**Pattern:** `{pattern_key}`\\\\n\\\\n\\\"\\n
        \           f\\\"This pattern was detected frequently in the audit log. \\\"\\n
        \           f\\\"Review and merge to add as a deterministic rule.\\\\n\\\\n\\\"\\n
        \           f\\\"**Rollback:** revert this PR or `kubectl rollout undo` affected
        deployments.\\\\n\\\\n\\\"\\n            f\\\"```yaml\\\\n{proposal_yaml}\\\\n```\\\"\\n
        \       ),\\n        \\\"head\\\": branch_name,\\n        \\\"base\\\": \\\"main\\\",\\n
        \   })\\n    if \\\"error\\\" in pr_result:\\n        log.error(f\\\"Failed
        to create PR: {pr_result['error']}\\\")\\n    else:\\n        log.info(f\\\"PR
        created: {pr_result.get('url', 'unknown')}\\\")\\n\\n    return pr_result\\n\\n\\ndef
        load_rules() -\\u003e dict:\\n    try:\\n        with open(RULES_PATH) as
        f:\\n            return yaml.safe_load(f) or {}\\n    except FileNotFoundError:\\n
        \       return {}\\n\\n\\nasync def get_audit_entries(count: int = 500) -\\u003e
        list[dict]:\\n    \\\"\\\"\\\"Fetch recent audit entries.\\\"\\\"\\\"\\n    try:\\n
        \       result = await call_mcp_tool(AUDIT_URL, \\\"get_recent_audit\\\",
        {\\\"count\\\": count})\\n        text = result.get(\\\"text\\\", \\\"\\\")\\n
        \       if not text:\\n            return []\\n        entries = []\\n        for
        line in text.strip().split(\\\"\\\\n\\\"):\\n            if line.strip():\\n
        \               try:\\n                    entries.append(json.loads(line))\\n
        \               except json.JSONDecodeError:\\n                    pass\\n
        \       return entries\\n    except Exception as e:\\n        log.debug(f\\\"Audit
        fetch failed: {e}\\\")\\n    return []\\n\\n\\nasync def post_proposal(pattern_key:
        str, count: int, examples: list[str],\\n                         proposed_rule:
        str):\\n    \\\"\\\"\\\"Post a hardening proposal to Slack and create a GitHub
        PR.\\\"\\\"\\\"\\n    # Create PR via github-mcp\\n    pr_result = await create_pr_via_github_mcp(proposed_rule,
        pattern_key)\\n    pr_url = pr_result.get(\\\"url\\\", \\\"\\\")\\n    pr_number
        = pr_result.get(\\\"number\\\", \\\"?\\\")\\n\\n    if not SLACK_BOT_TOKEN
        or not SLACK_PROPOSALS_CHANNEL:\\n        log.info(f\\\"PROPOSAL (no Slack):
        {pattern_key} ({count} occurrences) PR: {pr_url}\\\")\\n        log.info(f\\\"
        \ Rule: {proposed_rule}\\\")\\n        return\\n\\n    examples_text = \\\"\\\\n\\\".join(f\\\"
        \ • {e}\\\" for e in examples[:5])\\n    pr_text = f\\\"\\\\n\\\\n*PR:* \\u003c{pr_url}|#{pr_number}\\u003e
        — merge to approve, close to reject.\\\" if pr_url else \\\"\\\"\\n    try:\\n
        \       async with httpx.AsyncClient() as client:\\n            await client.post(\\n
        \               \\\"https://slack.com/api/chat.postMessage\\\",\\n                headers={\\n
        \                   \\\"Authorization\\\": f\\\"Bearer {SLACK_BOT_TOKEN}\\\",\\n
        \                   \\\"Content-Type\\\": \\\"application/json\\\",\\n                },\\n
        \               json={\\n                    \\\"channel\\\": SLACK_PROPOSALS_CHANNEL,\\n
        \                   \\\"blocks\\\": [\\n                        {\\n                            \\\"type\\\":
        \\\"section\\\",\\n                            \\\"text\\\": {\\n                                \\\"type\\\":
        \\\"mrkdwn\\\",\\n                                \\\"text\\\": (\\n                                    f\\\"\U0001F527
        *Hardening Proposal*\\\\n\\\"\\n                                    f\\\"*Pattern:*
        `{pattern_key}`\\\\n\\\"\\n                                    f\\\"*Occurrences:*
        {count}\\\\n\\\\n\\\"\\n                                    f\\\"*Recent examples:*\\\\n{examples_text}\\\\n\\\\n\\\"\\n
        \                                   f\\\"*Proposed rule:*\\\\n```{proposed_rule}```\\\"\\n
        \                                   f\\\"{pr_text}\\\"\\n                                ),\\n
        \                           },\\n                        },\\n                        {\\n
        \                           \\\"type\\\": \\\"context\\\",\\n                            \\\"elements\\\":
        [\\n                                {\\n                                    \\\"type\\\":
        \\\"mrkdwn\\\",\\n                                    \\\"text\\\": (\\n                                        \\\"Merge
        the PR to approve this rule. \\\"\\n                                        \\\"Close
        it to reject.\\\"\\n                                    ),\\n                                }\\n
        \                           ],\\n                        },\\n                    ],\\n
        \               },\\n                timeout=10,\\n            )\\n    except
        Exception as e:\\n        log.error(f\\\"Failed to post proposal: {e}\\\")\\n\\n\\ndef
        analyze_patterns(entries: list[dict]) -\\u003e list[dict]:\\n    \\\"\\\"\\\"\\n
        \   Find repetitive patterns in audit entries.\\n    Returns list of candidate
        proposals.\\n    \\\"\\\"\\\"\\n    # Group by (agent_name, action) pairs\\n
        \   pattern_counter: Counter = Counter()\\n    pattern_examples: dict[str,
        list[str]] = defaultdict(list)\\n\\n    for entry in entries:\\n        if
        entry.get(\\\"event_type\\\") != \\\"AGENT_ACTION\\\":\\n            continue\\n\\n
        \       agent = entry.get(\\\"agent_name\\\", \\\"unknown\\\")\\n        action
        = entry.get(\\\"action\\\", \\\"unknown\\\")\\n        details = entry.get(\\\"details\\\",
        \\\"\\\")\\n        key = f\\\"{agent}:{action}\\\"\\n\\n        pattern_counter[key]
        += 1\\n        if len(pattern_examples[key]) \\u003c 5:\\n            pattern_examples[key].append(details[:200])\\n\\n
        \   # Find patterns above threshold that we haven't proposed yet\\n    proposals
        = []\\n    for key, count in pattern_counter.most_common():\\n        if count
        \\u003e= PROPOSAL_THRESHOLD and key not in proposed_patterns:\\n            agent,
        action = key.split(\\\":\\\", 1)\\n            proposals.append({\\n                \\\"pattern_key\\\":
        key,\\n                \\\"agent\\\": agent,\\n                \\\"action\\\":
        action,\\n                \\\"count\\\": count,\\n                \\\"examples\\\":
        pattern_examples[key],\\n                \\\"proposed_rule\\\": (\\n                    f\\\"#
        Auto-generated rule for {key}\\\\n\\\"\\n                    f\\\"- pattern:
        \\\\\\\"{key}\\\\\\\"\\\\n\\\"\\n                    f\\\"  agent: {agent}\\\\n\\\"\\n
        \                   f\\\"  action: {action}\\\\n\\\"\\n                    f\\\"
        \ occurrences: {count}\\\\n\\\"\\n                    f\\\"  rule: \\\\\\\"deterministic\\\\\\\"
        \ # Replace LLM decision\\\\n\\\"\\n                    f\\\"  status: proposed
        \ # Change to 'active' after approval\\\"\\n                ),\\n            })\\n\\n
        \   return proposals\\n\\n\\nasync def analysis_loop():\\n    \\\"\\\"\\\"Main
        loop — analyze patterns and propose rules.\\\"\\\"\\\"\\n    log.info(\\n
        \       f\\\"Starting hardening analysis (interval={ANALYSIS_INTERVAL}s, \\\"\\n
        \       f\\\"threshold={PROPOSAL_THRESHOLD})\\\"\\n    )\\n\\n    while True:\\n
        \       try:\\n            entries = await get_audit_entries(500)\\n            if
        entries:\\n                proposals = analyze_patterns(entries)\\n                for
        p in proposals:\\n                    log.info(\\n                        f\\\"Proposing
        hardening rule: {p['pattern_key']} \\\"\\n                        f\\\"({p['count']}
        occurrences)\\\"\\n                    )\\n                    await post_proposal(\\n
        \                       p[\\\"pattern_key\\\"],\\n                        p[\\\"count\\\"],\\n
        \                       p[\\\"examples\\\"],\\n                        p[\\\"proposed_rule\\\"],\\n
        \                   )\\n                    proposed_patterns.add(p[\\\"pattern_key\\\"])\\n\\n
        \               if not proposals:\\n                    log.info(\\n                        f\\\"No
        new patterns above threshold ({PROPOSAL_THRESHOLD}). \\\"\\n                        f\\\"Analyzed
        {len(entries)} entries.\\\"\\n                    )\\n        except Exception
        as e:\\n            log.error(f\\\"Analysis error: {e}\\\")\\n\\n        await
        asyncio.sleep(ANALYSIS_INTERVAL)\\n\\n\\n# ── MCP Tools ────────────────────────────────────────────\\n\\n@mcp.tool()\\nasync
        def get_patterns() -\\u003e str:\\n    \\\"\\\"\\\"\\n    Get current decision
        patterns detected across all agents.\\n    Shows frequency of each (agent,
        action) pair.\\n    \\\"\\\"\\\"\\n    entries = await get_audit_entries(500)\\n
        \   counter: Counter = Counter()\\n    for entry in entries:\\n        if
        entry.get(\\\"event_type\\\") == \\\"AGENT_ACTION\\\":\\n            agent
        = entry.get(\\\"agent_name\\\", \\\"unknown\\\")\\n            action = entry.get(\\\"action\\\",
        \\\"unknown\\\")\\n            counter[f\\\"{agent}:{action}\\\"] += 1\\n\\n
        \   result = {\\n        \\\"total_entries_analyzed\\\": len(entries),\\n
        \       \\\"patterns\\\": [\\n            {\\\"pattern\\\": k, \\\"count\\\":
        v} for k, v in counter.most_common(20)\\n        ],\\n        \\\"proposal_threshold\\\":
        PROPOSAL_THRESHOLD,\\n        \\\"already_proposed\\\": list(proposed_patterns),\\n
        \   }\\n    return json.dumps(result, indent=2)\\n\\n\\n@mcp.tool()\\nasync
        def get_active_rules() -\\u003e str:\\n    \\\"\\\"\\\"Get the current set
        of approved hardening rules.\\\"\\\"\\\"\\n    rules = load_rules()\\n    return
        yaml.dump(rules, default_flow_style=False) if rules else \\\"No active rules
        yet.\\\"\\n\\n\\n# ── Entry point ──────────────────────────────────────────\\n\\nasync
        def main():\\n    import uvicorn\\n\\n    PORT = int(os.getenv(\\\"HARDENING_MCP_PORT\\\",
        \\\"8094\\\"))\\n    mcp_app = mcp.streamable_http_app()\\n    config = uvicorn.Config(mcp_app,
        host=\\\"0.0.0.0\\\", port=PORT, log_level=\\\"info\\\")\\n    server = uvicorn.Server(config)\\n\\n
        \   await asyncio.gather(\\n        analysis_loop(),\\n        server.serve(),\\n
        \   )\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    import anyio\\n\\n    anyio.run(main)\\n\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"creationTimestamp\":null,\"name\":\"hardening-agent-code\",\"namespace\":\"kagent\"}}\n"
