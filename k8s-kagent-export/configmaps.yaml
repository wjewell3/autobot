    nginx.conf: |
      events {}
      http {
        map_hash_bucket_size 128;
        map $http_x_api_secret $auth_ok {
          default 0;
          "9dafbf65be0dd88f3ec38e784d251598262fe6ccc28900f6ba49c5553c8f77e4" 1;
        }
        server {
          listen 8081;

          # Public - no auth needed (email button clicks)
          location /approval/respond {
            proxy_pass http://approval-server.kagent.svc.cluster.local:8089;
            add_header 'Access-Control-Allow-Origin' '*' always;
          }

          # Auth required for everything else
          location /approval/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://approval-server.kagent.svc.cluster.local:8089;
            add_header 'Access-Control-Allow-Origin' '*' always;
          }

          # Audit REST API (dashboard)
          location /audit-api/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://audit-logger.kagent.svc.cluster.local:8093/;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            if ($request_method = OPTIONS) { return 204; }
          }

          location /apis/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://kubectl-proxy.kagent.svc.cluster.local:8888;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            if ($request_method = OPTIONS) { return 204; }
          }
          location /api/v1/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://kubectl-proxy.kagent.svc.cluster.local:8888;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            if ($request_method = OPTIONS) { return 204; }
          }
          location /api/a2a/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://kagent-controller.kagent.svc.cluster.local:8083;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            if ($request_method = OPTIONS) { return 204; }
          }
          location /api/ {
            if ($auth_ok = 0) { return 401 "Unauthorized"; }
            proxy_pass http://kagent-controller.kagent.svc.cluster.local:8083;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            if ($request_method = OPTIONS) { return 204; }
          }
        }
      }
