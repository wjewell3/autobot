        as client:\\n            resp = await client.get(\\n                f\\\"{LITELLM_URL}/health\\\",
        timeout=5\\n            )\\n            if resp.status_code == 200:\\n                return
        resp.json()\\n    except Exception as e:\\n        log.debug(f\\\"LiteLLM
        health check failed (non-critical): {e}\\\")\\n    return {}\\n\\n\\nasync
        def get_audit_entries(count: int = 100) -\\u003e list[dict]:\\n    \\\"\\\"\\\"Fetch
        recent audit entries via MCP client SDK.\\\"\\\"\\\"\\n    try:\\n        from
        mcp.client.streamable_http import streamablehttp_client\\n        from mcp
        import ClientSession\\n\\n        audit_url = f\\\"{AUDIT_URL}/mcp\\\"\\n
        \       async with streamablehttp_client(audit_url) as (read, write, _):\\n
        \           async with ClientSession(read, write) as session:\\n                await
        session.initialize()\\n                result = await session.call_tool(\\n
        \                   \\\"get_recent_audit\\\", {\\\"count\\\": count}\\n                )\\n
        \               if result.content:\\n                    text = result.content[0].text\\n
        \                   entries = []\\n                    for line in text.strip().split(\\\"\\\\n\\\"):\\n
        \                       if line.strip():\\n                            try:\\n
        \                               entries.append(json.loads(line))\\n                            except
        json.JSONDecodeError:\\n                                pass\\n                    return
        entries\\n    except Exception as e:\\n        log.debug(f\\\"Audit fetch
        failed (non-critical): {e}\\\")\\n    return []\\n\\n\\nasync def enforce_budgets():\\n
        \   \\\"\\\"\\\"Main enforcement loop — check budgets and alert/kill on violations.\\\"\\\"\\\"\\n
        \   log.info(\\\"Starting budget enforcement loop\\\")\\n\\n    while True:\\n
        \       try:\\n            budgets = load_budgets()\\n            global_limits
        = budgets.get(\\\"global\\\", {})\\n            agent_limits = budgets.get(\\\"agents\\\",
        {})\\n\\n            # Count recent tool calls per agent from audit log\\n
        \           entries = await get_audit_entries(200)\\n            agent_actions:
        dict[str, int] = defaultdict(int)\\n            for entry in entries:\\n                agent
        = entry.get(\\\"agent_name\\\", \\\"unknown\\\")\\n                if entry.get(\\\"event_type\\\")
        == \\\"AGENT_ACTION\\\":\\n                    agent_actions[agent] += 1\\n\\n
        \           # Check global limits\\n            total_actions = sum(agent_actions.values())\\n
        \           global_max = global_limits.get(\\\"max_total_actions_per_hour\\\",
        500)\\n            if total_actions \\u003e global_max * 0.8:\\n                key
        = \\\"global-action-warning\\\"\\n                if key not in warnings_sent:\\n
        \                   await slack_alert(\\n                        f\\\"⚠️ Total
        agent actions at {total_actions}/{global_max} \\\"\\n                        f\\\"(80%
        threshold). Agents may be throttled.\\\"\\n                    )\\n                    warnings_sent.add(key)\\n\\n
        \           # Check per-agent limits\\n            for agent_name, count in
        agent_actions.items():\\n                agent_cfg = agent_limits.get(agent_name,
        agent_limits.get(\\\"_default\\\", {}))\\n                max_actions = agent_cfg.get(\\\"max_actions_per_hour\\\",
        100)\\n\\n                # Warning at 80%\\n                if count \\u003e
        max_actions * 0.8:\\n                    key = f\\\"{agent_name}-action-warning\\\"\\n
        \                   if key not in warnings_sent:\\n                        await
        slack_alert(\\n                            f\\\"⚠️ Agent `{agent_name}` at
        {count}/{max_actions} \\\"\\n                            f\\\"actions. Approaching
        limit.\\\"\\n                        )\\n                        warnings_sent.add(key)\\n\\n
        \               # Hard limit\\n                if count \\u003e max_actions:\\n
        \                   key = f\\\"{agent_name}-action-limit\\\"\\n                    if
        key not in warnings_sent:\\n                        await slack_alert(\\n
        \                           f\\\"\U0001F534 Agent `{agent_name}` EXCEEDED
        action limit \\\"\\n                            f\\\"({count}/{max_actions}).
        Manual review required.\\\"\\n                        )\\n                        warnings_sent.add(key)\\n\\n
        \       except Exception as e:\\n            log.error(f\\\"Budget enforcement
        error: {e}\\\")\\n\\n        await asyncio.sleep(CHECK_INTERVAL)\\n\\n\\n#
        ── MCP Tools ────────────────────────────────────────────\\n\\n@mcp.tool()\\nasync
        def check_budget(agent_name: str) -\\u003e str:\\n    \\\"\\\"\\\"\\n    Check
        remaining budget for an agent. Agents should call this\\n    before starting
        expensive operations.\\n\\n    Args:\\n        agent_name: Name of the agent
        checking its budget\\n    \\\"\\\"\\\"\\n    budgets = load_budgets()\\n    agent_limits
        = budgets.get(\\\"agents\\\", {})\\n    agent_cfg = agent_limits.get(agent_name,
        agent_limits.get(\\\"_default\\\", {}))\\n\\n    entries = await get_audit_entries(200)\\n
        \   action_count = sum(\\n        1 for e in entries\\n        if e.get(\\\"agent_name\\\")
        == agent_name and e.get(\\\"event_type\\\") == \\\"AGENT_ACTION\\\"\\n    )\\n\\n
        \   max_actions = agent_cfg.get(\\\"max_actions_per_hour\\\", 100)\\n    remaining
        = max(0, max_actions - action_count)\\n\\n    return json.dumps({\\n        \\\"agent\\\":
        agent_name,\\n        \\\"actions_used\\\": action_count,\\n        \\\"actions_limit\\\":
        max_actions,\\n        \\\"actions_remaining\\\": remaining,\\n        \\\"status\\\":
        \\\"ok\\\" if remaining \\u003e 0 else \\\"exceeded\\\",\\n    })\\n\\n\\n@mcp.tool()\\nasync
        def get_system_status() -\\u003e str:\\n    \\\"\\\"\\\"\\n    Get overall
        system resource status. Shows all agent budgets\\n    and global metrics.\\n
        \   \\\"\\\"\\\"\\n    budgets = load_budgets()\\n    entries = await get_audit_entries(200)\\n\\n
        \   agent_actions: dict[str, int] = defaultdict(int)\\n    for e in entries:\\n
        \       if e.get(\\\"event_type\\\") == \\\"AGENT_ACTION\\\":\\n            agent_actions[e.get(\\\"agent_name\\\",
        \\\"unknown\\\")] += 1\\n\\n    status = {\\n        \\\"total_actions\\\":
        sum(agent_actions.values()),\\n        \\\"global_limit\\\": budgets.get(\\\"global\\\",
        {}).get(\\\"max_total_actions_per_hour\\\", 500),\\n        \\\"agents\\\":
        {},\\n    }\\n\\n    agent_limits = budgets.get(\\\"agents\\\", {})\\n    for
        agent, count in agent_actions.items():\\n        cfg = agent_limits.get(agent,
        agent_limits.get(\\\"_default\\\", {}))\\n        limit = cfg.get(\\\"max_actions_per_hour\\\",
        100)\\n        status[\\\"agents\\\"][agent] = {\\n            \\\"actions\\\":
        count,\\n            \\\"limit\\\": limit,\\n            \\\"remaining\\\":
        max(0, limit - count),\\n        }\\n\\n    return json.dumps(status, indent=2)\\n\\n\\n#
        ── Entry point ──────────────────────────────────────────\\n\\nasync def main():\\n
        \   import uvicorn\\n\\n    PORT = int(os.getenv(\\\"GOVERNOR_MCP_PORT\\\",
        \\\"8093\\\"))\\n    mcp_app = mcp.streamable_http_app()\\n    config = uvicorn.Config(mcp_app,
        host=\\\"0.0.0.0\\\", port=PORT, log_level=\\\"info\\\")\\n    server = uvicorn.Server(config)\\n\\n
        \   await asyncio.gather(\\n        enforce_budgets(),\\n        server.serve(),\\n
        \   )\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    import anyio\\n\\n    anyio.run(main)\\n\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"creationTimestamp\":null,\"name\":\"resource-governor-code\",\"namespace\":\"kagent\"}}\n"
