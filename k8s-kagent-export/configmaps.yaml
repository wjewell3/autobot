        t in old_spec.get(\\\"declarative\\\", {}).get(\\\"tools\\\", [])\\n    }\\n
        \   new_tools = {\\n        json.dumps(t, sort_keys=True)\\n        for t
        in new_spec.get(\\\"declarative\\\", {}).get(\\\"tools\\\", [])\\n    }\\n\\n
        \   added_tools = new_tools - old_tools\\n    removed_tools = old_tools -
        new_tools\\n    if added_tools:\\n        changes.append(f\\\"tools added:
        {len(added_tools)}\\\")\\n    if removed_tools:\\n        changes.append(f\\\"tools
        removed: {len(removed_tools)}\\\")\\n\\n    old_msg = old_spec.get(\\\"declarative\\\",
        {}).get(\\\"systemMessage\\\", \\\"\\\")\\n    new_msg = new_spec.get(\\\"declarative\\\",
        {}).get(\\\"systemMessage\\\", \\\"\\\")\\n    if old_msg != new_msg:\\n        changes.append(\\\"systemMessage
        changed\\\")\\n\\n    old_desc = old_spec.get(\\\"description\\\", \\\"\\\")\\n
        \   new_desc = new_spec.get(\\\"description\\\", \\\"\\\")\\n    if old_desc
        != new_desc:\\n        changes.append(f\\\"description: '{old_desc}' → '{new_desc}'\\\")\\n\\n
        \   return changes\\n\\n\\nasync def watch_agents():\\n    \\\"\\\"\\\"Watch
        Agent CRs via K8s watch API and log all changes.\\\"\\\"\\\"\\n    log.info(f\\\"Starting
        agent watcher for namespace '{NAMESPACE}'\\\")\\n    url = (\\n        f\\\"{K8S_API}/apis/kagent.dev/v1alpha2/namespaces/{NAMESPACE}/agents\\\"\\n
        \       f\\\"?watch=true\\\"\\n    )\\n\\n    # Track last-seen specs to compute
        diffs on MODIFIED\\n    last_seen: dict[str, dict] = {}\\n\\n    while True:\\n
        \       try:\\n            async with httpx.AsyncClient(verify=SA_CA_PATH)
        as client:\\n                async with client.stream(\\n                    \\\"GET\\\",
        url, headers=get_k8s_headers(), timeout=None\\n                ) as resp:\\n
        \                   async for line in resp.aiter_lines():\\n                        if
        not line.strip():\\n                            continue\\n                        try:\\n
        \                           event = json.loads(line)\\n                        except
        json.JSONDecodeError:\\n                            continue\\n\\n                        event_type
        = event.get(\\\"type\\\", \\\"UNKNOWN\\\")\\n                        obj =
        event.get(\\\"object\\\", {})\\n                        agent_name = obj.get(\\\"metadata\\\",
        {}).get(\\\"name\\\", \\\"unknown\\\")\\n                        spec = obj.get(\\\"spec\\\",
        {})\\n                        generation = obj.get(\\\"metadata\\\", {}).get(\\\"generation\\\",
        0)\\n\\n                        entry = {\\n                            \\\"id\\\":
        f\\\"{agent_name}-gen{generation}-{event_type.lower()}\\\",\\n                            \\\"event_type\\\":
        event_type,\\n                            \\\"agent_name\\\": agent_name,\\n
        \                           \\\"generation\\\": generation,\\n                            \\\"labels\\\":
        obj.get(\\\"metadata\\\", {}).get(\\\"labels\\\", {}),\\n                        }\\n\\n
        \                       if event_type == \\\"ADDED\\\":\\n                            entry[\\\"tools\\\"]
        = [\\n                                summarize_tool(t)\\n                                for
        t in spec.get(\\\"declarative\\\", {}).get(\\\"tools\\\", [])\\n                            ]\\n
        \                           last_seen[agent_name] = spec\\n\\n                        elif
        event_type == \\\"MODIFIED\\\":\\n                            old_spec = last_seen.get(agent_name,
        {})\\n                            changes = diff_agents(old_spec, spec)\\n
        \                           entry[\\\"changes\\\"] = changes\\n                            entry[\\\"tools\\\"]
        = [\\n                                summarize_tool(t)\\n                                for
        t in spec.get(\\\"declarative\\\", {}).get(\\\"tools\\\", [])\\n                            ]\\n
        \                           last_seen[agent_name] = spec\\n\\n                        elif
        event_type == \\\"DELETED\\\":\\n                            last_seen.pop(agent_name,
        None)\\n\\n                        write_audit_entry(entry)\\n                        await
        post_to_slack(entry)\\n\\n        except Exception as e:\\n            log.error(f\\\"Watch
        connection failed: {e}, reconnecting in 5s...\\\")\\n            await asyncio.sleep(5)\\n\\n\\ndef
        summarize_tool(tool: dict) -\\u003e str:\\n    \\\"\\\"\\\"Return a compact
        string representation of a tool.\\\"\\\"\\\"\\n    if tool.get(\\\"type\\\")
        == \\\"McpServer\\\":\\n        mcp_info = tool.get(\\\"mcpServer\\\", {})\\n
        \       name = mcp_info.get(\\\"name\\\", \\\"?\\\")\\n        tools = mcp_info.get(\\\"toolNames\\\",
        [])\\n        return f\\\"mcp:{name}/{','.join(tools)}\\\"\\n    elif tool.get(\\\"type\\\")
        == \\\"Agent\\\":\\n        return f\\\"a2a:{tool.get('agent', {}).get('name',
        '?')}\\\"\\n    return f\\\"unknown:{tool.get('type', '?')}\\\"\\n\\n\\n#
        ── MCP Tools (so agents can write audit entries) ────────\\n\\n@mcp.tool()\\nasync
        def write_audit(\\n    agent_name: str,\\n    action: str,\\n    details:
        str,\\n    severity: str = \\\"info\\\",\\n) -\\u003e str:\\n    \\\"\\\"\\\"\\n
        \   Write a structured audit entry. Use this to log important decisions,\\n
        \   tool calls, or state changes.\\n\\n    Args:\\n        agent_name: Name
        of the agent writing the entry\\n        action:     What happened (e.g. \\\"created_repo\\\",
        \\\"sent_email\\\", \\\"searched_businesses\\\")\\n        details:    Human-readable
        description of what was done\\n        severity:   \\\"info\\\" | \\\"warning\\\"
        | \\\"error\\\" | \\\"critical\\\"\\n    \\\"\\\"\\\"\\n    entry = {\\n        \\\"id\\\":
        f\\\"agent-{agent_name}-{action}-{datetime.now(timezone.utc).strftime('%H%M%S')}\\\",\\n
        \       \\\"event_type\\\": \\\"AGENT_ACTION\\\",\\n        \\\"agent_name\\\":
        agent_name,\\n        \\\"action\\\": action,\\n        \\\"details\\\": details,\\n
        \       \\\"severity\\\": severity,\\n    }\\n    write_audit_entry(entry)\\n
        \   await post_to_slack(entry)\\n    return f\\\"Audit entry logged: {entry['id']}\\\"\\n\\n\\n@mcp.tool()\\nasync
        def get_recent_audit(count: int = 20) -\\u003e str:\\n    \\\"\\\"\\\"\\n
        \   Return the most recent audit entries.\\n\\n    Args:\\n        count:
        Number of recent entries to return (max 100)\\n    \\\"\\\"\\\"\\n    count
        = min(count, 100)\\n    try:\\n        with open(AUDIT_FILE) as f:\\n            lines
        = f.readlines()\\n        recent = lines[-count:] if len(lines) \\u003e count
        else lines\\n        return \\\"\\\\n\\\".join(line.strip() for line in recent)\\n
        \   except FileNotFoundError:\\n        return \\\"No audit entries yet.\\\"\\n\\n\\n#
        ── REST API (for dashboard — no MCP protocol needed) ────\\n\\nfrom starlette.applications
        import Starlette\\nfrom starlette.responses import JSONResponse\\nfrom starlette.routing
        import Route\\n\\n\\nasync def rest_get_entries(request):\\n    \\\"\\\"\\\"GET
        /entries?count=50\\u0026offset=0\\u0026agent=\\u0026type= — return audit entries
        as JSON.\\\"\\\"\\\"\\n    count = min(int(request.query_params.get(\\\"count\\\",
        \\\"50\\\")), 500)\\n    offset = int(request.query_params.get(\\\"offset\\\",
        \\\"0\\\"))\\n    agent_filter = request.query_params.get(\\\"agent\\\", \\\"\\\")\\n
        \   type_filter = request.query_params.get(\\\"type\\\", \\\"\\\")\\n\\n    try:\\n
        \       with open(AUDIT_FILE) as f:\\n            lines = f.readlines()\\n
        \   except FileNotFoundError:\\n        return JSONResponse({\\\"entries\\\":
        [], \\\"total\\\": 0})\\n\\n    entries = []\\n    for line in reversed(lines):\\n
        \       line = line.strip()\\n        if not line:\\n            continue\\n
        \       try:\\n            entry = json.loads(line)\\n        except json.JSONDecodeError:\\n
        \           continue\\n        if agent_filter and entry.get(\\\"agent_name\\\",
        \\\"\\\") != agent_filter:\\n            continue\\n        if type_filter
        and entry.get(\\\"event_type\\\", \\\"\\\") != type_filter:\\n            continue\\n
        \       entries.append(entry)\\n\\n    total = len(entries)\\n    entries
        = entries[offset:offset + count]\\n    return JSONResponse({\\\"entries\\\":
        entries, \\\"total\\\": total})\\n\\n\\nasync def rest_get_stats(request):\\n
        \   \\\"\\\"\\\"GET /stats — summary stats for the dashboard.\\\"\\\"\\\"\\n
        \   try:\\n        with open(AUDIT_FILE) as f:\\n            lines = f.readlines()\\n
        \   except FileNotFoundError:\\n        return JSONResponse({\\\"total_entries\\\":
        0, \\\"agents\\\": {}, \\\"event_types\\\": {}})\\n\\n    agents = {}\\n    event_types
        = {}\\n    for line in lines:\\n        line = line.strip()\\n        if not
        line:\\n            continue\\n        try:\\n            entry = json.loads(line)\\n
        \       except json.JSONDecodeError:\\n            continue\\n        agent
        = entry.get(\\\"agent_name\\\", \\\"unknown\\\")\\n        etype = entry.get(\\\"event_type\\\",
        \\\"unknown\\\")\\n        agents[agent] = agents.get(agent, 0) + 1\\n        event_types[etype]
        = event_types.get(etype, 0) + 1\\n\\n    return JSONResponse({\\n        \\\"total_entries\\\":
        len(lines),\\n        \\\"agents\\\": agents,\\n        \\\"event_types\\\":
        event_types,\\n    })\\n\\n\\nasync def rest_health(request):\\n    return
        JSONResponse({\\\"status\\\": \\\"ok\\\"})\\n\\n\\nrest_app = Starlette(routes=[\\n
        \   Route(\\\"/entries\\\", rest_get_entries),\\n    Route(\\\"/stats\\\",
        rest_get_stats),\\n    Route(\\\"/health\\\", rest_health),\\n])\\n\\n\\n#
        ── Entry point ──────────────────────────────────────────\\n\\nasync def main():\\n
        \   \\\"\\\"\\\"Run the K8s watcher, MCP server, and REST API concurrently.\\\"\\\"\\\"\\n
        \   import uvicorn\\n\\n    MCP_PORT = int(os.getenv(\\\"AUDIT_MCP_PORT\\\",
        \\\"8092\\\"))\\n    REST_PORT = int(os.getenv(\\\"AUDIT_REST_PORT\\\", \\\"8093\\\"))\\n\\n
        \   mcp_app = mcp.streamable_http_app()\\n    mcp_config = uvicorn.Config(mcp_app,
        host=\\\"0.0.0.0\\\", port=MCP_PORT, log_level=\\\"info\\\")\\n    mcp_server
        = uvicorn.Server(mcp_config)\\n\\n    rest_config = uvicorn.Config(rest_app,
        host=\\\"0.0.0.0\\\", port=REST_PORT, log_level=\\\"info\\\")\\n    rest_server
        = uvicorn.Server(rest_config)\\n\\n    # Run all three concurrently\\n    await
        asyncio.gather(\\n        watch_agents(),\\n        mcp_server.serve(),\\n
        \       rest_server.serve(),\\n    )\\n\\n\\nif __name__ == \\\"__main__\\\":\\n
        \   import anyio\\n\\n    anyio.run(main)\\n\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"creationTimestamp\":null,\"name\":\"audit-logger-code\",\"namespace\":\"kagent\"}}\n"
