    description: \"Thin router — dispatches to C-suite agents\"\n    allowed_tools:\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_describe_resource\n      - kagent-tool-server/k8s_apply_manifest\n      - kagent-tool-server/k8s_delete_resource\n      - kagent-tool-server/k8s_create_resource\n      - kagent-tool-server/k8s_get_resource_yaml\n      - kagent-tool-server/k8s_patch_resource\n      - search-tool-server/search_web\n      - search-tool-server/search_news\n      - search-tool-server/search_find_businesses\n      - github-tool-server/github_list_repos\n      - github-tool-server/github_create_repo\n      - github-tool-server/github_push_file\n      - github-tool-server/github_enable_pages\n      - github-tool-server/github_get_pages_url\n      - github-tool-server/github_create_branch\n      - github-tool-server/github_create_pr\n      - gmail-tool-server/gmail_request_approval\n      - gmail-tool-server/gmail_check_approval\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n      - resource-governor/check_budget\n      - resource-governor/get_system_status\n    allowed_agent_calls:\n      - ceo-agent\n      - coo-agent\n      - cso-agent\n      - pm-agent\n      - prospecting-agent\n      - number-agent-1\n      - number-agent-2\n      - number-agent-3\n      - sum-agent\n      - researcher-agent\n      - critic-agent\n      - writer-agent\n      - publisher-agent\n      - send-email-test\n\n  # ── C-Suite ────────────────────────────────────────────\n\n  ceo-agent:\n    description: \"Vision and strategy — no tools, pure reasoning\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  coo-agent:\n    description: \"Operations oversight — audit read + Slack\"\n    allowed_tools:\n      - audit-logger/get_recent_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  cso-agent:\n    description: \"Security enforcement — audit + HITL-gated remediation\"\n    allowed_tools:\n      - kagent-tool-server/k8s_get_resources\n      - kagent-tool-server/k8s_describe_resource\n      - kagent-tool-server/k8s_get_resource_yaml\n      - kagent-tool-server/k8s_delete_resource\n      - kagent-tool-server/k8s_patch_resource\n      - audit-logger/get_recent_audit\n      - audit-logger/write_audit\n      - hitl-tool-server/request_approval\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  pm-agent:\n    description: \"Project manager — delegates to workers, tracks backlog\"\n    allowed_tools:\n      - audit-logger/write_audit\n      - audit-logger/get_recent_audit\n      - hitl-tool-server/post_notification\n      - hitl-tool-server/request_approval\n    allowed_agent_calls:\n      - prospecting-agent\n\n  # ── Workers ────────────────────────────────────────────\n\n  prospecting-agent:\n    description: \"Finds local businesses that need websites\"\n    allowed_tools:\n      - search-tool-server/search_find_businesses\n      - search-tool-server/search_web\n      - audit-logger/write_audit\n      - hitl-tool-server/post_notification\n    allowed_agent_calls: []\n\n  # ── Demo/Legacy agents ─────────────────────────────────\n\n  number-agent-1:\n    description: \"Demo — picks a number\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  number-agent-2:\n    description: \"Demo — picks a number\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  number-agent-3:\n    description: \"Demo — picks a number\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  sum-agent:\n    description: \"Demo — calculates sum\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  researcher-agent:\n    description: \"Web search for facts\"\n    allowed_tools:\n      - search-tool-server/web_search\n      - search-tool-server/news_search\n    allowed_agent_calls: []\n\n  critic-agent:\n    description: \"Picks interesting facts\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  writer-agent:\n    description: \"Writes content\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  publisher-agent:\n    description: \"Publishes content\"\n    allowed_tools: []\n    allowed_agent_calls: []\n\n  send-email-test:\n    description: \"Test email sender\"\n    allowed_tools: []\n    allowed_agent_calls: []\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"capability-registry","namespace":"kagent"}}
