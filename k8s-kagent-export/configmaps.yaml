        \   return proposals\\n\\n\\n# ── Level 2: Failure Pattern Analysis ───────────────────\\n\\n#
        Keywords that signal different failure root causes\\nFAILURE_CATEGORIES =
        {\\n    \\\"empty_results\\\": [\\n        \\\"0 results\\\", \\\"no results\\\",
        \\\"found nothing\\\", \\\"no businesses\\\",\\n        \\\"nothing found\\\",
        \\\"returned 0\\\", \\\"empty\\\", \\\"none found\\\",\\n    ],\\n    \\\"wrong_results\\\":
        [\\n        \\\"churches\\\", \\\"cemeteries\\\", \\\"schools\\\", \\\"unrelated\\\",\\n
        \       \\\"doesn't match\\\", \\\"wrong type\\\", \\\"irrelevant\\\",\\n
        \   ],\\n    \\\"tool_failure\\\": [\\n        \\\"timeout\\\", \\\"connection
        refused\\\", \\\"500\\\", \\\"502\\\", \\\"503\\\",\\n        \\\"rate limit\\\",
        \\\"quota\\\", \\\"api error\\\", \\\"failed to call\\\",\\n    ],\\n    \\\"quality_issue\\\":
        [\\n        \\\"missing fields\\\", \\\"incomplete\\\", \\\"no url\\\", \\\"no
        email\\\",\\n        \\\"no address\\\", \\\"no name\\\", \\\"malformed\\\",
        \\\"invalid\\\",\\n    ],\\n}\\n\\n\\ndef categorize_failure(details: str)
        -\\u003e str:\\n    \\\"\\\"\\\"Extract a root-cause category from failure
        details text.\\\"\\\"\\\"\\n    details_lower = details.lower()\\n    for
        category, keywords in FAILURE_CATEGORIES.items():\\n        for kw in keywords:\\n
        \           if kw in details_lower:\\n                return category\\n    return
        \\\"uncategorized\\\"\\n\\n\\ndef analyze_failures(entries: list[dict]) -\\u003e
        list[dict]:\\n    \\\"\\\"\\\"\\n    Level 2: Find failure patterns — errors,
        warnings, and rejections.\\n    Groups by (agent, failure_category) and proposes
        system message fixes.\\n    \\\"\\\"\\\"\\n    failure_counter: Counter =
        Counter()\\n    failure_details: dict[str, list[dict]] = defaultdict(list)\\n\\n
        \   for entry in entries:\\n        if entry.get(\\\"event_type\\\") != \\\"AGENT_ACTION\\\":\\n
        \           continue\\n\\n        severity = entry.get(\\\"severity\\\", \\\"info\\\")\\n
        \       action = entry.get(\\\"action\\\", \\\"\\\")\\n        agent = entry.get(\\\"agent_name\\\",
        \\\"unknown\\\")\\n        details = entry.get(\\\"details\\\", \\\"\\\")\\n\\n
        \       # Capture errors/warnings and explicit rejections\\n        is_failure
        = severity in (\\\"error\\\", \\\"warning\\\", \\\"critical\\\")\\n        is_rejection
        = action in (\\n            \\\"output_rejected\\\", \\\"result_rejected\\\",
        \\\"task_blocked\\\",\\n            \\\"validation_failed\\\", \\\"retry_requested\\\",\\n
        \       )\\n\\n        if not (is_failure or is_rejection):\\n            continue\\n\\n
        \       category = categorize_failure(details)\\n        key = f\\\"failure:{agent}:{category}\\\"\\n\\n
        \       failure_counter[key] += 1\\n        if len(failure_details[key]) \\u003c
        10:\\n            failure_details[key].append({\\n                \\\"action\\\":
        action,\\n                \\\"details\\\": details[:300],\\n                \\\"severity\\\":
        severity,\\n                \\\"timestamp\\\": entry.get(\\\"timestamp\\\",
        \\\"\\\"),\\n            })\\n\\n    # Generate proposals for recurring failures\\n
        \   proposals = []\\n    for key, count in failure_counter.most_common():\\n
        \       if count \\u003e= FAILURE_THRESHOLD and key not in proposed_failures:\\n
        \           _, agent, category = key.split(\\\":\\\", 2)\\n            examples
        = failure_details[key]\\n\\n            # Build a context-rich proposal\\n
        \           example_summaries = \\\"\\\\n\\\".join(\\n                f\\\"
        \ - [{e['severity']}] {e['action']}: {e['details'][:150]}\\\"\\n                for
        e in examples[:5]\\n            )\\n\\n            proposal_text = (\\n                f\\\"#
        Failure pattern: {key}\\\\n\\\"\\n                f\\\"# Detected {count}
        occurrences (threshold: {FAILURE_THRESHOLD})\\\\n\\\"\\n                f\\\"#\\\\n\\\"\\n
        \               f\\\"# Root cause category: {category}\\\\n\\\"\\n                f\\\"#
        Affected agent: {agent}\\\\n\\\"\\n                f\\\"#\\\\n\\\"\\n                f\\\"#
        Recent examples:\\\\n\\\"\\n                + \\\"\\\\n\\\".join(f\\\"#   {e['action']}:
        {e['details'][:120]}\\\" for e in examples[:5])\\n                + \\\"\\\\n#\\\\n\\\"\\n
        \               f\\\"# RECOMMENDED FIX: Update {agent} system message to address
        this.\\\\n\\\"\\n                f\\\"type: system_message_patch\\\\n\\\"\\n
        \               f\\\"agent: {agent}\\\\n\\\"\\n                f\\\"failure_category:
        {category}\\\\n\\\"\\n                f\\\"occurrences: {count}\\\\n\\\"\\n
        \               f\\\"status: proposed\\\\n\\\"\\n                f\\\"recommendation:
        |\\\\n\\\"\\n                + _generate_recommendation(agent, category, examples)\\n
        \           )\\n\\n            proposals.append({\\n                \\\"pattern_key\\\":
        key,\\n                \\\"agent\\\": agent,\\n                \\\"category\\\":
        category,\\n                \\\"count\\\": count,\\n                \\\"examples\\\":
        [e[\\\"details\\\"][:200] for e in examples[:5]],\\n                \\\"proposed_rule\\\":
        proposal_text,\\n                \\\"is_failure\\\": True,\\n            })\\n\\n
        \   return proposals\\n\\n\\ndef _generate_recommendation(agent: str, category:
        str, examples: list[dict]) -\\u003e str:\\n    \\\"\\\"\\\"Generate a human-readable
        recommendation based on failure category.\\\"\\\"\\\"\\n    recs = {\\n        \\\"empty_results\\\":
        (\\n            f\\\"  Add to {agent} system message:\\\\n\\\"\\n            f\\\"
        \ - If primary search method returns 0 results, try at least 2 alternative
        approaches before reporting failure.\\\\n\\\"\\n            f\\\"  - Never
        accept 0 results for a category that obviously exists in the target area.\\\\n\\\"\\n
        \           f\\\"  - Log which search methods were tried and what each returned.\\\"\\n
        \       ),\\n        \\\"wrong_results\\\": (\\n            f\\\"  Add to
        {agent} system message:\\\\n\\\"\\n            f\\\"  - Validate that results
        match the requested category before returning.\\\\n\\\"\\n            f\\\"
        \ - If results contain unrelated business types, filter them out and try more
        specific queries.\\\\n\\\"\\n            f\\\"  - Quality check: does every
        result actually match what was asked for?\\\"\\n        ),\\n        \\\"tool_failure\\\":
        (\\n            f\\\"  Add to {agent} system message:\\\\n\\\"\\n            f\\\"
        \ - If a tool call fails (timeout, error), retry once with backoff.\\\\n\\\"\\n
        \           f\\\"  - If primary tool is unavailable, fall back to secondary
        tools.\\\\n\\\"\\n            f\\\"  - Report tool failures explicitly so
        the issue can be diagnosed.\\\"\\n        ),\\n        \\\"quality_issue\\\":
        (\\n            f\\\"  Add to {agent} system message:\\\\n\\\"\\n            f\\\"
        \ - Validate all required fields are present before returning results.\\\\n\\\"\\n
        \           f\\\"  - If key fields (name, URL, address) are missing, attempt
        to fill them with additional lookups.\\\\n\\\"\\n            f\\\"  - Return
        partial results clearly marked as incomplete rather than silently omitting
        fields.\\\"\\n        ),\\n        \\\"uncategorized\\\": (\\n            f\\\"
        \ Review the failure examples above and add specific guardrails to {agent}'s
        system message.\\\\n\\\"\\n            f\\\"  Consider: What instruction would
        have prevented this failure?\\\"\\n        ),\\n    }\\n    return recs.get(category,
        recs[\\\"uncategorized\\\"])\\n\\n\\nasync def post_failure_proposal(pattern_key:
        str, count: int, agent: str,\\n                                 category:
        str, examples: list[str],\\n                                 proposed_rule:
        str):\\n    \\\"\\\"\\\"Post a failure-pattern proposal to Slack and create
        a GitHub PR.\\\"\\\"\\\"\\n    pr_result = await create_pr_via_github_mcp(proposed_rule,
        pattern_key)\\n    pr_url = pr_result.get(\\\"url\\\", \\\"\\\")\\n    pr_number
        = pr_result.get(\\\"number\\\", \\\"?\\\")\\n\\n    if not SLACK_BOT_TOKEN
        or not SLACK_PROPOSALS_CHANNEL:\\n        log.info(f\\\"FAILURE PROPOSAL (no
        Slack): {pattern_key} ({count}x) PR: {pr_url}\\\")\\n        return\\n\\n
        \   examples_text = \\\"\\\\n\\\".join(f\\\"  • {e}\\\" for e in examples[:5])\\n
        \   pr_text = f\\\"\\\\n\\\\n*PR:* \\u003c{pr_url}|#{pr_number}\\u003e\\\"
        if pr_url else \\\"\\\"\\n    try:\\n        async with httpx.AsyncClient()
        as client:\\n            await client.post(\\n                \\\"https://slack.com/api/chat.postMessage\\\",\\n
        \               headers={\\n                    \\\"Authorization\\\": f\\\"Bearer
        {SLACK_BOT_TOKEN}\\\",\\n                    \\\"Content-Type\\\": \\\"application/json\\\",\\n
        \               },\\n                json={\\n                    \\\"channel\\\":
        SLACK_PROPOSALS_CHANNEL,\\n                    \\\"blocks\\\": [\\n                        {\\n
        \                           \\\"type\\\": \\\"section\\\",\\n                            \\\"text\\\":
        {\\n                                \\\"type\\\": \\\"mrkdwn\\\",\\n                                \\\"text\\\":
        (\\n                                    f\\\"\U0001F6A8 *Failure Pattern Detected*\\\\n\\\"\\n
        \                                   f\\\"*Agent:* `{agent}`\\\\n\\\"\\n                                    f\\\"*Category:*
        `{category}`\\\\n\\\"\\n                                    f\\\"*Occurrences:*
        {count} (threshold: {FAILURE_THRESHOLD})\\\\n\\\\n\\\"\\n                                    f\\\"*Recent
        failures:*\\\\n{examples_text}\\\\n\\\\n\\\"\\n                                    f\\\"*Recommended:*
        Update `{agent}` system message.\\\"\\n                                    f\\\"{pr_text}\\\"\\n
        \                               ),\\n                            },\\n                        },\\n
        \                       {\\n                            \\\"type\\\": \\\"context\\\",\\n
        \                           \\\"elements\\\": [\\n                                {\\n
        \                                   \\\"type\\\": \\\"mrkdwn\\\",\\n                                    \\\"text\\\":
        (\\n                                        \\\"This is a Level 2 (failure
        analysis) proposal. \\\"\\n                                        \\\"Merge
        the PR to apply the fix.\\\"\\n                                    ),\\n                                }\\n
        \                           ],\\n                        },\\n                    ],\\n
        \               },\\n                timeout=10,\\n            )\\n    except
        Exception as e:\\n        log.error(f\\\"Failed to post failure proposal:
        {e}\\\")\\n\\n\\nasync def analysis_loop():\\n    \\\"\\\"\\\"Main loop —
        analyze patterns (Level 1) and failures (Level 2).\\\"\\\"\\\"\\n    log.info(\\n
        \       f\\\"Starting hardening analysis (interval={ANALYSIS_INTERVAL}s, \\\"\\n
        \       f\\\"pattern_threshold={PROPOSAL_THRESHOLD}, failure_threshold={FAILURE_THRESHOLD})\\\"\\n
        \   )\\n\\n    while True:\\n        try:\\n            entries = await get_audit_entries(500)\\n
        \           if entries:\\n                # Level 1: Frequency-based pattern
        proposals\\n                proposals = analyze_patterns(entries)\\n                for
        p in proposals:\\n                    log.info(\\n                        f\\\"L1
        Proposing hardening rule: {p['pattern_key']} \\\"\\n                        f\\\"({p['count']}
        occurrences)\\\"\\n                    )\\n                    await post_proposal(\\n
        \                       p[\\\"pattern_key\\\"],\\n                        p[\\\"count\\\"],\\n
        \                       p[\\\"examples\\\"],\\n                        p[\\\"proposed_rule\\\"],\\n
        \                   )\\n                    proposed_patterns.add(p[\\\"pattern_key\\\"])\\n\\n
        \               # Level 2: Failure pattern analysis\\n                failure_proposals
        = analyze_failures(entries)\\n                for fp in failure_proposals:\\n
        \                   log.info(\\n                        f\\\"L2 Failure pattern:
        {fp['pattern_key']} \\\"\\n                        f\\\"({fp['count']}x, category={fp['category']})\\\"\\n
        \                   )\\n                    await post_failure_proposal(\\n
        \                       fp[\\\"pattern_key\\\"],\\n                        fp[\\\"count\\\"],\\n
        \                       fp[\\\"agent\\\"],\\n                        fp[\\\"category\\\"],\\n
        \                       fp[\\\"examples\\\"],\\n                        fp[\\\"proposed_rule\\\"],\\n
        \                   )\\n                    proposed_failures.add(fp[\\\"pattern_key\\\"])\\n\\n
        \               total_proposals = len(proposals) + len(failure_proposals)\\n
        \               if total_proposals == 0:\\n                    log.info(\\n
        \                       f\\\"No new patterns. Analyzed {len(entries)} entries.
        \\\"\\n                        f\\\"(L1 threshold={PROPOSAL_THRESHOLD}, L2
        threshold={FAILURE_THRESHOLD})\\\"\\n                    )\\n        except
        Exception as e:\\n            log.error(f\\\"Analysis error: {e}\\\")\\n\\n
        \       await asyncio.sleep(ANALYSIS_INTERVAL)\\n\\n\\n# ── MCP Tools ────────────────────────────────────────────\\n\\n@mcp.tool()\\nasync
        def get_patterns() -\\u003e str:\\n    \\\"\\\"\\\"\\n    Get current decision
        patterns detected across all agents.\\n    Shows frequency of each (agent,
        action) pair.\\n    \\\"\\\"\\\"\\n    entries = await get_audit_entries(500)\\n
        \   counter: Counter = Counter()\\n    for entry in entries:\\n        if
        entry.get(\\\"event_type\\\") == \\\"AGENT_ACTION\\\":\\n            agent
        = entry.get(\\\"agent_name\\\", \\\"unknown\\\")\\n            action = entry.get(\\\"action\\\",
        \\\"unknown\\\")\\n            counter[f\\\"{agent}:{action}\\\"] += 1\\n\\n
        \   result = {\\n        \\\"total_entries_analyzed\\\": len(entries),\\n
        \       \\\"patterns\\\": [\\n            {\\\"pattern\\\": k, \\\"count\\\":
        v} for k, v in counter.most_common(20)\\n        ],\\n        \\\"proposal_threshold\\\":
        PROPOSAL_THRESHOLD,\\n        \\\"already_proposed\\\": list(proposed_patterns),\\n
        \   }\\n    return json.dumps(result, indent=2)\\n\\n\\n@mcp.tool()\\nasync
        def get_failure_patterns() -\\u003e str:\\n    \\\"\\\"\\\"\\n    Get failure
        patterns detected across all agents.\\n    Shows recurring errors, warnings,
        and output rejections grouped by\\n    (agent, failure_category). These drive
        Level 2 system message fix proposals.\\n    \\\"\\\"\\\"\\n    entries = await
        get_audit_entries(500)\\n\\n    failure_counter: Counter = Counter()\\n    failure_examples:
        dict[str, list[str]] = defaultdict(list)\\n\\n    for entry in entries:\\n
        \       if entry.get(\\\"event_type\\\") != \\\"AGENT_ACTION\\\":\\n            continue\\n
        \       severity = entry.get(\\\"severity\\\", \\\"info\\\")\\n        action
        = entry.get(\\\"action\\\", \\\"\\\")\\n        agent = entry.get(\\\"agent_name\\\",
        \\\"unknown\\\")\\n        details = entry.get(\\\"details\\\", \\\"\\\")\\n\\n
        \       is_failure = severity in (\\\"error\\\", \\\"warning\\\", \\\"critical\\\")\\n
        \       is_rejection = action in (\\n            \\\"output_rejected\\\",
        \\\"result_rejected\\\", \\\"task_blocked\\\",\\n            \\\"validation_failed\\\",
        \\\"retry_requested\\\",\\n        )\\n        if not (is_failure or is_rejection):\\n
        \           continue\\n\\n        category = categorize_failure(details)\\n
        \       key = f\\\"{agent}:{category}\\\"\\n        failure_counter[key] +=
        1\\n        if len(failure_examples[key]) \\u003c 3:\\n            failure_examples[key].append(details[:200])\\n\\n
        \   result = {\\n        \\\"total_entries_analyzed\\\": len(entries),\\n
        \       \\\"failure_patterns\\\": [\\n            {\\n                \\\"agent_category\\\":
        k,\\n                \\\"count\\\": v,\\n                \\\"examples\\\":
        failure_examples[k],\\n            }\\n            for k, v in failure_counter.most_common(20)\\n
        \       ],\\n        \\\"failure_threshold\\\": FAILURE_THRESHOLD,\\n        \\\"already_proposed\\\":
        list(proposed_failures),\\n    }\\n    return json.dumps(result, indent=2)\\n\\n\\n@mcp.tool()\\nasync
        def get_active_rules() -\\u003e str:\\n    \\\"\\\"\\\"Get the current set
        of approved hardening rules.\\\"\\\"\\\"\\n    rules = load_rules()\\n    return
        yaml.dump(rules, default_flow_style=False) if rules else \\\"No active rules
        yet.\\\"\\n\\n\\n# ── Entry point ──────────────────────────────────────────\\n\\nasync
        def main():\\n    import uvicorn\\n\\n    PORT = int(os.getenv(\\\"HARDENING_MCP_PORT\\\",
        \\\"8094\\\"))\\n    mcp_app = mcp.streamable_http_app()\\n    config = uvicorn.Config(mcp_app,
        host=\\\"0.0.0.0\\\", port=PORT, log_level=\\\"info\\\")\\n    server = uvicorn.Server(config)\\n\\n
        \   await asyncio.gather(\\n        analysis_loop(),\\n        server.serve(),\\n
        \   )\\n\\n\\nif __name__ == \\\"__main__\\\":\\n    import anyio\\n\\n    anyio.run(main)\\n\"},\"kind\":\"ConfigMap\",\"metadata\":{\"annotations\":{},\"creationTimestamp\":null,\"name\":\"hardening-agent-code\",\"namespace\":\"kagent\"}}\n"
