        {"apiVersion":"v1","data":{"server.py":"from fastapi import FastAPI\nimport json, uvicorn, os, smtplib, httpx\nfrom email.mime.text import MIMEText\nfrom email.mime.multipart import MIMEMultipart\n\napp = FastAPI()\nGMAIL = os.environ.get(\"GMAIL_EMAIL\", \"\")\nGMAIL_PASS = os.environ.get(\"GMAIL_APP_PASSWORD\", \"\")\nAPPROVAL_URL = \"http://approval-server.kagent.svc.cluster.local:8089\"\n\nTOOLS = [\n  {\"name\": \"gmail_send_email\", \"description\": \"Send email via Gmail.\", \"inputSchema\": {\"type\": \"object\", \"properties\": {\"to\": {\"type\": \"string\"}, \"subject\": {\"type\": \"string\"}, \"body\": {\"type\": \"string\"}, \"html\": {\"type\": \"boolean\", \"default\": False}}, \"required\": [\"to\", \"subject\", \"body\"]}},\n  {\"name\": \"gmail_request_approval\", \"description\": \"Send HTML approval email with APPROVE/REJECT buttons. After calling, Phase A is DONE - do not wait or poll.\", \"inputSchema\": {\"type\": \"object\", \"properties\": {\"to\": {\"type\": \"string\"}, \"subject\": {\"type\": \"string\"}, \"details\": {\"type\": \"string\"}, \"business\": {\"type\": \"string\"}, \"repo\": {\"type\": \"string\"}}, \"required\": [\"to\", \"subject\", \"details\", \"business\", \"repo\"]}},\n  {\"name\": \"gmail_check_approval\", \"description\": \"Check approval status. Returns PENDING, APPROVED, or REJECTED. Only call if explicitly asked.\", \"inputSchema\": {\"type\": \"object\", \"properties\": {\"token\": {\"type\": \"string\"}}, \"required\": [\"token\"]}}\n]\n\ndef send_raw(to, subject, body, html=False):\n    msg = MIMEMultipart(\"alternative\")\n    msg[\"Subject\"] = subject\n    msg[\"From\"] = GMAIL\n    msg[\"To\"] = to\n    msg.attach(MIMEText(body, \"html\" if html else \"plain\"))\n    with smtplib.SMTP_SSL(\"smtp.gmail.com\", 465) as s:\n        s.login(GMAIL, GMAIL_PASS)\n        s.sendmail(GMAIL, to, msg.as_string())\n\n@app.post(\"/mcp\")\nasync def mcp(request: dict):\n    method = request.get(\"method\")\n    id_ = request.get(\"id\")\n    if method == \"initialize\":\n        return {\"jsonrpc\": \"2.0\", \"id\": id_, \"result\": {\"protocolVersion\": \"2024-11-05\", \"capabilities\": {\"tools\": {}}, \"serverInfo\": {\"name\": \"gmail_mcp\", \"version\": \"1.0.0\"}}}\n    if method == \"tools/list\":\n        return {\"jsonrpc\": \"2.0\", \"id\": id_, \"result\": {\"tools\": TOOLS}}\n    if method == \"tools/call\":\n        name = request[\"params\"][\"name\"]\n        args = request[\"params\"].get(\"arguments\", {})\n        try:\n            if name == \"gmail_send_email\":\n                send_raw(args[\"to\"], args[\"subject\"], args[\"body\"], args.get(\"html\", False))\n                text = json.dumps({\"sent\": True, \"to\": args[\"to\"]})\n                print(f\"[gmail_send_email] to={args['to']}\")\n            elif name == \"gmail_request_approval\":\n                async with httpx.AsyncClient(timeout=10) as client:\n                    r = await client.post(f\"{APPROVAL_URL}/approval/create\", json={\"subject\": args[\"subject\"], \"details\": args[\"details\"], \"business\": args.get(\"business\",\"\"), \"repo\": args.get(\"repo\",\"\")})\n                    data = r.json()\n                send_raw(args[\"to\"], f\"[ACTION REQUIRED] {args['subject']}\", data[\"email_html\"], html=True)\n                text = json.dumps({\"token\": data[\"token\"], \"sent\": True, \"message\": \"Approval email sent. Phase A complete.\"})\n                print(f\"[gmail_request_approval] to={args['to']} token={data['token']}\")\n            elif name == \"gmail_check_approval\":\n                async with httpx.AsyncClient(timeout=10) as client:\n                    r = await client.get(f\"{APPROVAL_URL}/approval/status?token={args['token']}\")\n                    data = r.json()\n                text = json.dumps(data)\n                print(f\"[gmail_check_approval] status={data.get('status')}\")\n            else:\n                text = \"Unknown tool\"\n        except Exception as e:\n            text = json.dumps({\"error\": str(e)})\n            print(f\"[{name}] ERROR: {e}\")\n        return {\"jsonrpc\": \"2.0\", \"id\": id_, \"result\": {\"content\": [{\"type\": \"text\", \"text\": text}]}}\n    return {\"jsonrpc\": \"2.0\", \"id\": id_, \"error\": {\"code\": -32601, \"message\": \"Method not found\"}}\n\nif __name__ == \"__main__\":\n    uvicorn.run(app, host=\"0.0.0.0\", port=8088)\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":null,"name":"gmail-mcp-server","namespace":"kagent"}}
