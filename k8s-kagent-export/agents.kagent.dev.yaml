    name: researcher-agent
    namespace: kagent
    resourceVersion: "1052949"
    uid: a6b73498-ee83-4df9-86b4-9021b35761ba
  spec:
    declarative:
      modelConfig: default-model-config
      systemMessage: 'You are researcher-agent. You have access to web_search and
        news_search tools. You MUST call web_search before responding - never answer
        from memory or training data. When given a topic: 1) Call web_search with
        the topic as query. 2) Read the actual results returned. 3) Extract the 3
        most interesting facts from those results. 4) Return the facts with their
        source URLs. If web_search fails, call news_search as fallback. Never skip
        the tool call.'
      tools:
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: search-tool-server
          toolNames:
          - web_search
          - news_search
        type: McpServer
    description: Returns 3 interesting facts about a topic.
    type: Declarative
  status:
