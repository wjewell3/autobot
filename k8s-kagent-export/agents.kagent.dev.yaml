          toolNames:
          - k8s_get_resources
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: audit-logger
          toolNames:
          - get_recent_audit
          - write_audit
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: hitl-tool-server
          toolNames:
          - post_notification
        type: McpServer
    description: Monitors token usage, context window limits, cluster resource allocation.
      Guards against runaway consumption.
    type: Declarative
