      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
          - k8s_get_resources
          - k8s_describe_resource
          - k8s_apply_manifest
          - k8s_delete_resource
          - k8s_create_resource
          - k8s_get_resource_yaml
          - k8s_patch_resource
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: search-tool-server
          toolNames:
          - search_web
          - search_news
          - search_find_businesses
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: github-tool-server
          toolNames:
          - github_list_repos
          - github_create_repo
          - github_push_file
          - github_enable_pages
          - github_get_pages_url
        type: McpServer
      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: gmail-tool-server
          toolNames:
          - gmail_send_email
          - gmail_request_approval
          - gmail_check_approval
        type: McpServer
