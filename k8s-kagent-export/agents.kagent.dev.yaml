      - mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
          - k8s_get_resources
          - k8s_describe_resource
          - k8s_apply_manifest
          - k8s_delete_resource
          - k8s_create_resource
          - k8s_get_resource_yaml
