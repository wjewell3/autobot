      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"batch/v1","kind":"CronJob","metadata":{"annotations":{},"name":"adversarial-sweep","namespace":"kagent"},"spec":{"concurrencyPolicy":"Forbid","failedJobsHistoryLimit":2,"jobTemplate":{"spec":{"backoffLimit":1,"template":{"metadata":{"labels":{"app":"adversarial-sweep"}},"spec":{"containers":[{"args":["pip install mcp httpx --quiet 2\u003e/dev/null\npython - \u003c\u003c'PYEOF'\nimport asyncio, json, datetime\nfrom mcp.client.streamable_http import streamablehttp_client\nfrom mcp import ClientSession\n\nADVERSARIAL_URL = \"http://adversarial-tester.kagent.svc.cluster.local:8098\"\nHITL_URL = \"http://hitl-tool-server.kagent.svc.cluster.local:8091\"\nCATEGORIES = [\"data_quality\", \"injection\", \"boundary\", \"governance\"]\n\nasync def main():\n    results = {}\n    coverage = None\n\n    async with streamablehttp_client(f\"{ADVERSARIAL_URL}/mcp\") as (read, write, _):\n        async with ClientSession(read, write) as session:\n            await session.initialize()\n            for cat in CATEGORIES:\n                try:\n                    r = await session.call_tool(\"run_adversarial_suite\", {\"category\": cat})\n                    results[cat] = json.loads(r.content[0].text) if r.content else {}\n                    passed = results[cat].get(\"passed\", 0)\n                    total = results[cat].get(\"total\", 0)\n                    print(f\"[{cat}] {passed}/{total} passed\")\n                except Exception as e:\n                    results[cat] = {\"error\": str(e)}\n                    print(f\"[{cat}] ERROR: {e}\")\n\n            try:\n                cr = await session.call_tool(\"get_coverage_report\", {})\n                coverage = cr.content[0].text if cr.content else None\n            except Exception as e:\n                coverage = f\"coverage report failed: {e}\"\n\n    # Build summary\n    date = datetime.datetime.utcnow().strftime(\"%Y-%m-%d\")\n    lines = [f\"*Weekly adversarial sweep* ({date})\"]\n    all_pass = True\n    for cat, res in results.items():\n        if \"error\" in res:\n            lines.append(f\"  ❌ {cat}: error — {res['error']}\")\n            all_pass = False\n        else:\n            passed = res.get(\"passed\", 0)\n            total = res.get(\"total\", 0)\n            failures = res.get(\"failures\", [])\n            icon = \"✅\" if passed == total else \"⚠️\"\n            if passed != total:\n                all_pass = False\n            lines.append(f\"  {icon} {cat}: {passed}/{total}\")\n            for f in failures:\n                lines.append(f\"      • FAIL: {f}\")\n    if coverage:\n        lines.append(f\"\\n{coverage}\")\n    lines.append(\"_governance controls verified_\" if all_pass else \"_⚠️ review failures above_\")\n    message = \"\\n\".join(lines)\n    print(message)\n\n    # Post to Slack\n    try:\n        async with streamablehttp_client(f\"{HITL_URL}/mcp\") as (r2, w2, _):\n            async with ClientSession(r2, w2) as s2:\n                await s2.initialize()\n                await s2.call_tool(\"post_notification\", {\n                    \"message\": message,\n                    \"channel\": \"agent-workers\"\n                })\n        print(\"[OK] Slack notification sent\")\n    except Exception as e:\n        print(f\"[WARN] Slack notify failed (non-fatal): {e}\")\n\nasyncio.run(main())\nPYEOF\n"],"command":["/bin/sh","-c"],"image":"docker.io/python:3.11-slim","name":"adversarial-sweep"}],"restartPolicy":"OnFailure"}}}},"schedule":"0 3 * * 1","successfulJobsHistoryLimit":3}}
    creationTimestamp: "2026-03-28T01:43:34Z"
    generation: 2
    name: adversarial-sweep
    namespace: kagent
    resourceVersion: "5209813"
    uid: a9c1846b-3069-4c71-9644-edcae544ebe1
  spec:
    concurrencyPolicy: Forbid
    failedJobsHistoryLimit: 1
    jobTemplate:
      metadata: {}
      spec:
        backoffLimit: 1
        template:
          metadata:
            labels:
              app: adversarial-sweep
          spec:
            containers:
            - args:
              - |
                pip install mcp httpx --quiet 2>/dev/null
                python - <<'PYEOF'
                import asyncio, json, datetime
                from mcp.client.streamable_http import streamablehttp_client
                from mcp import ClientSession

                ADVERSARIAL_URL = "http://adversarial-tester.kagent.svc.cluster.local:8098"
                HITL_URL = "http://hitl-tool-server.kagent.svc.cluster.local:8091"
                CATEGORIES = ["data_quality", "injection", "boundary", "governance"]

                async def main():
                    results = {}
                    coverage = None

                    async with streamablehttp_client(f"{ADVERSARIAL_URL}/mcp") as (read, write, _):
                        async with ClientSession(read, write) as session:
                            await session.initialize()
                            for cat in CATEGORIES:
                                try:
                                    r = await session.call_tool("run_adversarial_suite", {"category": cat})
                                    results[cat] = json.loads(r.content[0].text) if r.content else {}
                                    passed = results[cat].get("passed", 0)
                                    total = results[cat].get("total", 0)
                                    print(f"[{cat}] {passed}/{total} passed")
                                except Exception as e:
                                    results[cat] = {"error": str(e)}
                                    print(f"[{cat}] ERROR: {e}")

                            try:
                                cr = await session.call_tool("get_coverage_report", {})
                                coverage = cr.content[0].text if cr.content else None
                            except Exception as e:
                                coverage = f"coverage report failed: {e}"

                    # Build summary
                    date = datetime.datetime.utcnow().strftime("%Y-%m-%d")
                    lines = [f"*Weekly adversarial sweep* ({date})"]
                    all_pass = True
                    for cat, res in results.items():
                        if "error" in res:
                            lines.append(f"  ❌ {cat}: error — {res['error']}")
                            all_pass = False
                        else:
                            passed = res.get("passed", 0)
                            total = res.get("total", 0)
                            failures = res.get("failures", [])
                            icon = "✅" if passed == total else "⚠️"
                            if passed != total:
                                all_pass = False
                            lines.append(f"  {icon} {cat}: {passed}/{total}")
                            for f in failures:
                                lines.append(f"      • FAIL: {f}")
                    if coverage:
                        lines.append(f"\n{coverage}")
                    lines.append("_governance controls verified_" if all_pass else "_⚠️ review failures above_")
                    message = "\n".join(lines)
                    print(message)

                    # Post to Slack
                    try:
                        async with streamablehttp_client(f"{HITL_URL}/mcp") as (r2, w2, _):
                            async with ClientSession(r2, w2) as s2:
                                await s2.initialize()
                                await s2.call_tool("post_notification", {
                                    "message": message,
                                    "channel": "agent-workers"
                                })
                        print("[OK] Slack notification sent")
                    except Exception as e:
                        print(f"[WARN] Slack notify failed (non-fatal): {e}")

                asyncio.run(main())
                PYEOF
              command:
              - /bin/sh
              - -c
              image: docker.io/python:3.11-slim
              imagePullPolicy: IfNotPresent
              name: adversarial-sweep
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
            dnsPolicy: ClusterFirst
            restartPolicy: OnFailure
            schedulerName: default-scheduler
            securityContext: {}
            terminationGracePeriodSeconds: 30
    schedule: 0 3 * * 1
    successfulJobsHistoryLimit: 3
    suspend: false
  status:
    lastScheduleTime: "2026-03-30T03:00:00Z"
    lastSuccessfulTime: "2026-03-30T03:10:19Z"
