    - description: "\n    Get hit/miss statistics for all rules.\n    Use this to
        measure how much LLM surface has been replaced by deterministic rules.\n    "
      name: get_rule_stats
    - description: Force reload rules from ConfigMap. Call after updating the rules
        ConfigMap.
      name: reload_rules
    - description: "\n    Promote a rule's status: proposed → shadow → active, or
