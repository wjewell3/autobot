- apiVersion: kagent.dev/v1alpha2
  kind: RemoteMCPServer
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"kagent.dev/v1alpha2","kind":"RemoteMCPServer","metadata":{"annotations":{},"name":"codegen-mcp","namespace":"kagent"},"spec":{"description":"Test runner + microservice deployer for codegen-agent. Spawns ephemeral K8s Jobs to run pytest suites and deploys approved services directly to the cluster. Tools: run_test_suite, deploy_microservice, lock_service, get_lock_status.","protocol":"STREAMABLE_HTTP","url":"http://codegen-mcp.kagent.svc.cluster.local:8100/mcp"}}
    creationTimestamp: "2026-03-30T11:21:33Z"
    generation: 1
    name: codegen-mcp
    namespace: kagent
    resourceVersion: "5373731"
    uid: 23a46daa-e7a9-4d75-a95a-7a14f7192ac1
  spec:
    description: 'Test runner + microservice deployer for codegen-agent. Spawns ephemeral
      K8s Jobs to run pytest suites and deploys approved services directly to the
      cluster. Tools: run_test_suite, deploy_microservice, lock_service, get_lock_status.'
    protocol: STREAMABLE_HTTP
    terminateOnClose: true
    url: http://codegen-mcp.kagent.svc.cluster.local:8100/mcp
  status:
    conditions:
    - lastTransitionTime: "2026-03-30T11:22:33Z"
      message: Remote MCP server configuration accepted
      observedGeneration: 1
      reason: Reconciled
      status: "True"
      type: Accepted
    discoveredTools:
    - description: "\n    Run a pytest test suite against generated service code in
        an ephemeral K8s Job.\n\n    Mounts service_code as service.py and test_code
        as test_service.py into the job\n    container via ConfigMap. Installs dependencies,
        runs pytest -v --tb=short, fetches\n    stdout, parses passed/failed counts,
        and cleans up the Job+ConfigMap.\n\n    Args:\n        service_name:  Short
        identifier used in K8s resource names (e.g. \"prospecting-mcp\").\n                       Must
        be DNS-label safe (lowercase, no spaces).\n        service_code:  Full Python
        source of the service module (imported as `service`).\n        test_code:
        \    Full Python source of the pytest file. Import service with:\n                       `from
        service import <function>` since service.py is in the same dir.\n        requirements:
        \ Space-separated pip packages needed beyond pytest\n                       (e.g.
        \"httpx requests beautifulsoup4\").\n\n    Returns:\n        JSON: {\n          \"passed\":
        int,\n          \"failed\": int,\n          \"total\": int,\n          \"exit_zero\":
        bool,        # True if job pod exited 0\n          \"output\": str,            #
        Last 4000 chars of pytest stdout\n          \"iteration_hint\": str     #
        \"all_passing\" | \"improving\" | \"stuck\" | \"no_tests_found\"\n        }\n
        \   "
      name: run_test_suite
    - description: "\n    Deploy a generated Python MCP microservice to the cluster.\n\n
        \   Creates four K8s resources:\n      1. ConfigMap <name>-code — contains
        server.py\n      2. Deployment <name>    — python:3.12-slim, pip install +
        python /app/server.py\n      3. Service <name>       — ClusterIP on <port>\n
        \     4. RemoteMCPServer <name> — STREAMABLE_HTTP pointing to http://<name>.kagent.svc.cluster.local:<port>/mcp\n\n
        \   All resources get label codegen-managed=true.\n    ONLY call this after
        receiving HITL approval — never pre-deploy.\n\n    Args:\n        name:         DNS-safe
        resource name (e.g. \"prospecting-mcp\").\n        code:         Full Python
        source. MUST follow the FastMCP server template\n                      (see
        project_summary.md). Use `anyio.run(uvicorn.Server(config).serve)`.\n        port:
        \        Container port. Use next free port from allocation table (8101+).\n
        \       requirements: Space-separated pip packages (fastapi uvicorn mcp httpx
        anyio included).\n        description:  Human-readable description for the
        RemoteMCPServer CR.\n\n    Returns:\n        JSON: {\n          \"name\":
        str,\n          \"endpoint\": str,        # MCP endpoint URL\n          \"resources\":
        {configmap, deployment, service, remotemcpserver},\n          \"next_steps\":
        [str]      # Manual steps to complete the integration\n        }\n    "
      name: deploy_microservice
    - description: "\n    Write an immutable lock record to shared-state for a compiled
        service.\n\n    Locked services are protected — codegen-agent, rd-agent, and
        hardening-agent\n    all check lock status before modifying anything related
        to that agent.\n    Only a human can request a revisit (\"revisit <agent-name>\"
        message to codegen-agent).\n\n    Args:\n        agent_name:  Target agent
        name (e.g. \"prospecting-agent\").\n        version:     Git tag or iteration
        label (e.g. \"v4\" or \"iteration-7\").\n        approved_by: Human identifier
        from HITL payload (e.g. \"user\" or Slack handle).\n        notes:       Optional
        notes from the approval — e.g. feedback incorporated.\n\n    Returns:\n        JSON:
        {\"locked\": bool, \"agent\": str, \"version\": str}\n    "
      name: lock_service
    - description: "\n    Check whether a compiled service is locked for a given agent.\n\n
        \   Args:\n        agent_name: Target agent name (e.g. \"prospecting-agent\").\n\n
        \   Returns:\n        JSON lock record if locked: {\"status\": \"locked\",
        \"version\": ..., \"approved_by\": ..., ...}\n        {\"status\": \"unlocked\"}
        if no lock exists.\n        {\"status\": \"unknown\", \"error\": ...} if shared-state
        is unreachable.\n    "
      name: get_lock_status
    observedGeneration: 1
- apiVersion: kagent.dev/v1alpha2
  kind: RemoteMCPServer
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"kagent.dev/v1alpha2","kind":"RemoteMCPServer","metadata":{"annotations":{},"name":"eval-harness","namespace":"kagent"},"spec":{"description":"Eval harness — measures agent quality before/after changes. Tools: run_eval, compare_eval, set_baseline, get_baseline, list_suites","protocol":"STREAMABLE_HTTP","url":"http://eval-harness.kagent.svc.cluster.local:8096/mcp"}}
    creationTimestamp: "2026-03-28T01:31:35Z"
    generation: 1
    name: eval-harness
    namespace: kagent
    resourceVersion: "4218219"
    uid: 0a6ae5d7-6e0c-4cc0-a43b-a01fc0a94ca9
  spec:
    description: 'Eval harness — measures agent quality before/after changes. Tools:
      run_eval, compare_eval, set_baseline, get_baseline, list_suites'
    protocol: STREAMABLE_HTTP
    terminateOnClose: true
    url: http://eval-harness.kagent.svc.cluster.local:8096/mcp
  status:
    conditions:
    - lastTransitionTime: "2026-03-28T01:32:35Z"
      message: Remote MCP server configuration accepted
      observedGeneration: 1
      reason: Reconciled
      status: "True"
      type: Accepted
    discoveredTools:
    - description: "\n    Run an eval suite against an agent and return detailed scores.\n\n
        \   Args:\n        agent: Agent name (e.g. \"prospecting-agent\")\n        suite:
        Eval suite name from cases.yaml (default: \"default\")\n\n    Returns:\n        JSON
        with per-case scores and overall average\n    "
      name: run_eval
    - description: "\n    Get the current baseline scores for an agent.\n    Baselines
        represent \"known good\" performance to compare against.\n    "
      name: get_baseline
    - description: "\n    Run the eval suite and save the results as the new baseline.\n
        \   Call this after deploying a known-good version of an agent.\n\n    Args:\n
        \       agent: Agent name\n        suite: Eval suite to establish baseline
        for\n    "
      name: set_baseline
    - description: "\n    Run eval suite and compare against baseline. Returns improvement/regression.\n\n
        \   This is what rd-agent calls before proposing a system message change:\n
        \     1. Run eval → get current score\n      2. Apply proposed change (in
        shadow)\n      3. Run eval again → get new score\n      4. If regression →
        reject change. If improvement → proceed with PR.\n\n    Returns:\n        JSON
        with {baseline_score, current_score, delta, verdict: \"improvement\"|\"regression\"|\"neutral\"}\n
        \   "
      name: compare_eval
    - description: List all available eval suites and their case counts.
      name: list_suites
    observedGeneration: 1
