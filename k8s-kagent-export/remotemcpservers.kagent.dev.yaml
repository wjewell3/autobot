- apiVersion: kagent.dev/v1alpha2
  kind: RemoteMCPServer
  metadata:
    annotations:
      kagent.dev/reindex-ts: "1774274701"
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"kagent.dev/v1alpha2","kind":"RemoteMCPServer","metadata":{"annotations":{},"name":"hitl-tool-server","namespace":"kagent"},"spec":{"description":"Slack HITL approval tools — request_approval and post_notification","url":"http://hitl-tool-server.kagent.svc.cluster.local:8091/mcp"}}
    creationTimestamp: "2026-03-22T22:59:51Z"
    generation: 2
    labels:
      app.kubernetes.io/instance: kagent
      app.kubernetes.io/managed-by: Helm
      app.kubernetes.io/name: kagent
      app.kubernetes.io/part-of: kagent
      app.kubernetes.io/version: 0.7.23
      helm.sh/chart: kagent-0.7.23
    name: hitl-tool-server
    namespace: kagent
    resourceVersion: "2068917"
    uid: eab0ce03-f5e1-4693-83dd-0e0b79060f2c
  spec:
    description: Slack HITL approval tools — request_approval and post_notification
      (indexed)
    protocol: STREAMABLE_HTTP
    terminateOnClose: true
    url: http://hitl-tool-server.kagent.svc.cluster.local:8091/mcp
  status:
    conditions:
    - lastTransitionTime: "2026-03-23T13:34:39Z"
      message: Remote MCP server configuration accepted
      observedGeneration: 2
      reason: Reconciled
      status: "True"
      type: Accepted
    discoveredTools:
    - description: "\n    Post an approval request to #hitl-approvals in Slack.\n
        \   The agent should stop after calling this and wait to be resumed\n    via
        a HITL_RESUME message from the commander.\n\n    Args:\n        task_context:
        \    What the agent is currently doing (e.g. \"Finding business targets in
        Nashville\")\n        proposed_action:  The specific action requiring approval
        (e.g. \"Send cold email to 47 contacts\")\n        severity:         \"low\"
        | \"medium\" | \"high\"\n                          low    = auto-approve after
        30min if no response\n                          medium = escalate after 15min
        if no response\n                          high   = auto-reject after 5min
        if no response (fail safe)\n        requesting_agent: Name of the calling
        agent (e.g. \"prospecting-agent\")\n\n    Returns:\n        request_id to
        include in any follow-up context\n    "
      name: request_approval
    - description: "\n    Post a plain notification to a Slack channel (no approval
        needed).\n    Use for status updates, alerts, or informational messages.\n\n
        \   Args:\n        channel:          Channel ID (e.g. C0XXXXXXX) or name (e.g.
        agent-workers)\n        message:          Message text (supports Slack mrkdwn
        formatting)\n        requesting_agent: Name of the calling agent\n    "
      name: post_notification
    observedGeneration: 2
