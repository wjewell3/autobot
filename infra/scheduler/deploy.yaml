          volumes:
            - name: code
              configMap:
                name: scheduler-code

---
# ── COO Status Check — every 4 hours ────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: scheduler-coo-status
  namespace: kagent
spec:
  schedule: "0 */4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: scheduler
              image: docker.io/python@sha256:3d5ed973e45820f5ba5e46bd065bd88b3a504ff0724d85980dcd05eab361fcf4  # python:3.12-slim
              command: ["/bin/sh", "-c"]
              args:
                - pip install httpx --quiet && python /app/scheduler.py
              env:
                - name: TASK_TYPE
                  value: "coo-status-check"
              volumeMounts:
                - name: code
                  mountPath: /app
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "25m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
          volumes:
            - name: code
              configMap:
                name: scheduler-code
