  name: outreach-mcp
  namespace: kagent
  labels:
    app: outreach-mcp
    codegen-managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outreach-mcp
  template:
    metadata:
      labels:
        app: outreach-mcp
        codegen-managed: "true"
    spec:
      containers:
        - name: outreach-mcp
          image: docker.io/python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install fastapi uvicorn mcp anyio --quiet && \
              python /app/server.py
          ports:
            - containerPort: 8103
          env:
            - name: OUTREACH_MCP_PORT
              value: "8103"
            - name: OPERATOR_EMAIL
              value: "jewell.will@gmail.com"
          volumeMounts:
            - name: server-code
              mountPath: /app
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: server-code
          configMap:
            name: outreach-mcp-code
---
apiVersion: v1
kind: Service
metadata:
  name: outreach-mcp
  namespace: kagent
  labels:
    codegen-managed: "true"
spec:
  selector:
    app: outreach-mcp
  ports:
    - port: 8103
      targetPort: 8103
      protocol: TCP
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: outreach-mcp
  namespace: kagent
  labels:
    codegen-managed: "true"
spec:
  description: >
    Deterministic email rendering with hard phase enforcement for outreach-agent.
    Tools: render_email (full HTML email, TESTING forces recipient=operator),
    validate_email_draft (quality checklist). Port 8103.
    Phase enforcement is in code — cannot be reasoned around by LLM.
    Replaces ~600 token email generation in outreach-agent.
  protocol: STREAMABLE_HTTP
  url: http://outreach-mcp.kagent.svc.cluster.local:8103/mcp
