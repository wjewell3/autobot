apiVersion: batch/v1
kind: CronJob
metadata:
  name: north-star-assessment
  namespace: kagent
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: trigger
            image: docker.io/curlimages/curl:8.5.0
            command:
            - sh
            - -c
            - |
              curl -sS -m 240 -X POST \
                http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/north-star-agent/ \
                -H 'Content-Type: application/json' \
                -d '{"jsonrpc":"2.0","method":"message/send","id":"north-star-scheduled","params":{"message":{"role":"user","parts":[{"kind":"text","text":"Run trajectory assessment cycle. Compare current system state against the project vision. Score each dimension, identify trends, flag drift, and post your report to Slack."}]}}}'
