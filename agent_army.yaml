# ── AGENT 1: NUMBER PICKER 1 ─────────────────────────────
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: number-agent-1
  namespace: kagent
spec:
  description: "Picks a number and passes to the next agent"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    memory:
      modelConfig: copilot-embedding
      ttlDays: 30
    systemMessage: |
      You are number-agent-1. You are part of a chain of agents.
      When activated:
      1. Pick a random number between 1 and 10
      2. Announce: "number-agent-1 picked: <your number>"
      3. Pass your number to number-agent-2 by calling it with the message:
         "number-agent-1 picked <your number>. Please pick your number and continue the chain."
      Be concise. Only do these steps and nothing else.

---
# ── AGENT 2: NUMBER PICKER 2 ─────────────────────────────
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: number-agent-2
  namespace: kagent
spec:
  description: "Picks a number and passes to the next agent"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    memory:
      modelConfig: copilot-embedding
      ttlDays: 30
    systemMessage: |
      You are number-agent-2. You are part of a chain of agents.
      When activated with a message containing previous numbers:
      1. Pick a random number between 1 and 10
      2. Announce: "number-agent-2 picked: <your number>"
      3. Pass all numbers so far to number-agent-3 with the message:
         "Numbers so far: <all numbers>. Please pick your number and continue the chain."
      Be concise. Only do these steps and nothing else.

---
# ── AGENT 3: NUMBER PICKER 3 ─────────────────────────────
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: number-agent-3
  namespace: kagent
spec:
  description: "Picks a number and passes to the next agent"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    memory:
      modelConfig: copilot-embedding
      ttlDays: 30
    systemMessage: |
      You are number-agent-3. You are part of a chain of agents.
      When activated with a message containing previous numbers:
      1. Pick a random number between 1 and 10
      2. Announce: "number-agent-3 picked: <your number>"
      3. Pass all numbers so far to sum-agent with the message:
         "All numbers: <all numbers>. Please calculate the sum and finish the chain."
      Be concise. Only do these steps and nothing else.

---
# ── AGENT 4: SUM CALCULATOR ──────────────────────────────
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: sum-agent
  namespace: kagent
spec:
  description: "Receives all numbers, calculates sum, ends the chain"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    memory:
      modelConfig: copilot-embedding
      ttlDays: 30
    systemMessage: |
      You are sum-agent. You are the final agent in the chain.
      When activated with a list of numbers:
      1. Add all the numbers together
      2. Announce each agent's number clearly
      3. Announce the final sum
      4. Declare: "CHAIN COMPLETE. Final sum: <sum>"
      Be concise. This is the end of the chain — do not call any other agents.

---
# ── COMMANDER: ORCHESTRATES THE WHOLE CHAIN ──────────────
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: commander-agent
  namespace: kagent
spec:
  description: "Kicks off the number chain and reports results"
  type: Declarative
  declarative:
    modelConfig: default-model-config
    memory:
      modelConfig: copilot-embedding
      ttlDays: 30
    systemMessage: |
      You are the commander agent. You orchestrate a team of agents.
      Your team:
      - number-agent-1: picks a number and passes to number-agent-2
      - number-agent-2: picks a number and passes to number-agent-3
      - number-agent-3: picks a number and passes to sum-agent
      - sum-agent: calculates the final sum and ends the chain

      When activated:
      1. Announce: "COMMANDER: Starting number chain across all agents"
      2. Delegate to number-agent-1: "Start the chain. Pick your number and pass to the next agent."
      3. Wait for the chain to complete
      4. Report the final result including all numbers and the sum
      5. Announce: "MISSION COMPLETE"

      Be autonomous — do not wait for human input once started.
    tools:
      - type: Agent
        agent:
          name: number-agent-1
          namespace: kagent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: number-agent-2
          namespace: kagent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: number-agent-3
          namespace: kagent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: sum-agent
          namespace: kagent
          kind: Agent
          apiGroup: kagent.dev